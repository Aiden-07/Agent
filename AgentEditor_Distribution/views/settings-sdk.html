<div class="animate-fade-in max-w-4xl space-y-6">
    <!-- 水印配置 -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold text-gray-800">水印配置</h3>
            <button class="text-blue-600 text-sm hover:underline">保存</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 目录栏水印 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">目录栏水印上传</label>
                <p class="text-xs text-gray-500 mb-3">支持 PNG、SVG 格式。请将矢量图的背景透明度调整到 100%，再上传。</p>

                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 mb-2"></i>
                        <div class="flex text-sm text-gray-600 justify-center">
                            <span class="relative cursor-pointer bg-transparent rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
                                <span>点击上传文件</span>
                                <input id="sidebar-watermark-upload" name="sidebar-watermark-upload" type="file" class="sr-only" accept=".png,.svg">
                            </span>
                            <p class="pl-1">或拖拽文件至此处</p>
                        </div>
                        <p class="text-xs text-gray-500">PNG, SVG (最大 2MB)</p>
                    </div>
                </div>
            </div>

            <!-- 对话交互页面水印 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">对话交互页面水印上传</label>

                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 mb-2"></i>

                        <p class="text-xs text-gray-500">PNG, SVG (最大 2MB)</p>

                </div>

    <!-- 悬浮图标配置 -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold text-gray-800">悬浮图标配置</h3>
            <button class="text-blue-600 text-sm hover:underline">保存</button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">悬浮图标上传</label>
