<div id="kb-list-view" class="space-y-6 animate-fade-in">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="relative">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="搜索知识库..." class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
            </div>
        </div>
        <button onclick="openModal('create-kb-modal')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
            <i class="fa-solid fa-plus"></i>
            新建知识库
        </button>
    </div>

    <!-- Knowledge Base List -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <table class="w-full text-sm text-left">
            <thead class="bg-gray-50 text-gray-500 font-medium border-b border-gray-100">
                <tr>
                    <th class="px-6 py-4">知识库名称</th>
                    <th class="px-6 py-4">标签</th>
                    <th class="px-6 py-4">文档数量</th>
                    <th class="px-6 py-4">更新时间</th>
                    <th class="px-6 py-4">创建人</th>
                    <th class="px-6 py-4 text-right"></th>
                </tr>
            </thead>
            <tbody id="knowledge-list-body" class="divide-y divide-gray-100">
                <!-- Dynamic Content -->
            </tbody>
        </table>
    </div>
</div>

<!-- Create KB Modal -->
<div id="create-kb-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-all duration-300">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden animate-fade-in-up transform transition-all">
         <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 class="font-semibold text-gray-800 text-lg">新建知识库</h3>
            <button onclick="closeModal('create-kb-modal')" class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-full hover:bg-gray-200">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
         <div class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">知识库名称 <span class="text-red-500">*</span></label>
                <input type="text" id="create-kb-name" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow" placeholder="例如：产品需求文档库" maxlength="50">
                <p id="create-kb-name-error" class="text-red-500 text-xs mt-1 hidden"><i class="fa-solid fa-circle-exclamation mr-1"></i> 请输入知识库名称</p>
                <p class="text-xs text-gray-400 mt-1 text-right">0/50</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">知识库描述 <span class="text-red-500">*</span></label>
                <textarea id="create-kb-desc" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow resize-none" rows="4" placeholder="简要描述该知识库的内容和用途..." maxlength="200"></textarea>
                <p id="create-kb-desc-error" class="text-red-500 text-xs mt-1 hidden"><i class="fa-solid fa-circle-exclamation mr-1"></i> 请输入知识库描述</p>
                <p class="text-xs text-gray-400 mt-1 text-right">0/200</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Embedding 模型 <span class="text-red-500">*</span></label>
                <div class="relative">
                    <select id="create-kb-parser" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-none bg-white transition-shadow cursor-pointer">
                        <option value="embedding-2">embedding-2</option>
                        <option value="embedding-3">embedding-3</option>
                        <option value="text_embedding">text_embedding</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </div>
                </div>
                <p class="text-xs text-gray-500 mt-1">选择合适的 Embedding 模型可以提高知识检索的准确性。</p>
            </div>

            <div class="mt-4 border-t border-gray-100 pt-4 space-y-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">检索设置</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">检索模式</label>
                        <select id="create-kb-retrieval-mode" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white text-sm">
                            <option value="">请选择检索模式</option>
                            <option value="vector">向量检索</option>
                            <option value="fulltext">全文检索</option>
                            <option value="hybrid">混合检索</option>
                        </select>
                    </div>
                </div>
                <div id="create-kb-retrieval-config" class="mt-2 space-y-3"></div>
            </div>
        </div>
         <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3 border-t border-gray-100">
            <button onclick="closeModal('create-kb-modal')" class="px-5 py-2.5 text-gray-600 hover:bg-gray-200 rounded-lg text-sm font-medium transition-colors">取消</button>
            <button onclick="submitCreateKb()" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-all shadow-sm hover:shadow-md">创建</button>
        </div>
    </div>
</div>

<!-- Knowledge Base Detail View -->
    <div id="kb-detail-view" class="hidden h-full flex flex-col animate-fade-in">
        <!-- Header with Back Button and Tabs -->
        <div class="flex items-center justify-between mb-4 flex-shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="backToKbList()" class="flex items-center gap-2 text-gray-600 hover:text-blue-600 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span class="text-sm font-medium">返回知识库列表</span>
                </button>
                <div class="h-4 w-px bg-gray-300"></div>
                <h2 id="kb-detail-title" class="text-lg font-semibold text-gray-800">知识库详情</h2>
            </div>

            <!-- View Tabs -->
            <div class="bg-gray-100 p-1 rounded-lg flex items-center">
                <button onclick="switchKbTab('list')" id="tab-kb-list" class="px-4 py-1.5 rounded-md text-sm font-medium text-blue-600 bg-white shadow-sm transition-all">
                    <i class="fa-solid fa-list-ul mr-2"></i>列表视图
                </button>
                <button onclick="switchKbTab('knowledge')" id="tab-kb-knowledge" class="px-4 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all">
                    <i class="fa-solid fa-book-open mr-2"></i>知识视图
                </button>
            </div>
        </div>

        <!-- Tab Content: Document List -->
        <div id="doc-list-tab" class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
            <!-- Toolbar -->
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                 <div class="relative">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="doc-search-input" oninput="searchDocs(this.value)" placeholder="搜索文档..." class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
                </div>
                <div class="flex gap-2">
                     <button class="bg-white border border-gray-200 text-gray-600 hover:text-blue-600 px-3 py-2 rounded-lg text-sm font-medium transition-colors">
                        <i class="fa-solid fa-upload mr-1"></i> 上传文档
                    </button>
                </div>
            </div>
            
            <div id="doc-list-scroll-container" class="flex-1 overflow-auto relative">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 text-gray-500 font-medium border-b border-gray-100 sticky top-0 z-10">
                        <tr>
                            <th class="px-6 py-4">文档名称</th>
                            <th class="px-6 py-4">大小</th>
                            <th class="px-6 py-4">类型</th>
                            <th class="px-6 py-4">职级</th>
                            <th class="px-6 py-4">职责</th>
                            <th class="px-6 py-4">状态</th>
                            <th class="px-6 py-4">修改时间</th>
                            <th class="px-6 py-4 text-right"></th>
                        </tr>
                    </thead>
                    <tbody id="doc-list-body" class="divide-y divide-gray-100">
                        <!-- Dynamic Content -->
                    </tbody>
                </table>
                <!-- Loading Spinner -->
                <div id="doc-list-loading" class="hidden py-4 text-center text-gray-400">
                    <i class="fa-solid fa-circle-notch fa-spin mr-2"></i> 加载中...
                </div>
            </div>
            
            <!-- Total Count Footer (Replaces Pagination) -->
            <div class="px-6 py-2 border-t border-gray-100 bg-gray-50 text-center">
                <span id="doc-total-count" class="text-xs text-gray-400">共 0 个文档</span>
            </div>
        </div>

        <!-- Tab Content: Knowledge View (Split Pane) -->
        <div id="knowledge-view-tab" class="hidden flex-1 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex">
            <!-- Left Tree -->
            <div class="w-1/4 md:w-[18%] border-r border-gray-100 flex flex-col bg-gray-50 transition-all duration-300 ease-in-out">
                <div class="p-3 border-b border-gray-100">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" oninput="searchTreeDocs(this.value)" placeholder="搜索知识..." class="pl-8 pr-3 py-1.5 border border-gray-200 rounded-md text-xs focus:outline-none focus:ring-1 focus:ring-blue-500 w-full bg-white">
                    </div>
                </div>
                <div id="doc-tree-container" class="flex-1 overflow-y-auto p-2 space-y-0.5">
                    <!-- Tree Content -->
                </div>
                
                <!-- Fixed Bottom Upload Button -->
                <div class="p-3 border-t border-gray-200 bg-white z-10">
                    <button onclick="triggerDocUpload()" id="btn-tree-upload" class="w-full bg-white border border-[#E0E0E0] hover:bg-gray-50 hover:border-gray-300 text-[#333333] py-2 px-3 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2 shadow-sm hover:shadow-md group min-h-[40px]">
                        <i class="fa-solid fa-cloud-arrow-up text-gray-500 group-hover:-translate-y-0.5 transition-transform"></i>
                        <span>上传文档</span>
                    </button>
                    <!-- Progress Bar (Hidden by default) -->
                    <div id="tree-upload-progress" class="hidden mt-3 animate-fade-in">
                         <div class="flex justify-between text-xs text-gray-500 mb-1">
                            <span id="upload-status-text">正在上传...</span>
                            <span id="upload-percent">0%</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">
                            <div id="upload-progress-bar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                    <input type="file" id="tree-upload-input" class="hidden" multiple onchange="handleTreeUpload(this)">
                </div>
            </div>
            <!-- Right Content -->
            <div class="flex-1 flex flex-col bg-white">
                 <div class="p-6 border-b border-gray-100 flex justify-between items-start">
                    <div>
                        <h2 id="doc-preview-title" class="text-xl font-bold text-gray-800 mb-2">请选择文档</h2>
                        <div class="flex gap-4 text-xs text-gray-500">
                            <span id="doc-preview-meta"></span>
                        </div>
                    </div>
                     <div class="flex items-center gap-2">
                        <div id="doc-actions-normal" class="hidden flex gap-2">
                            <button id="btn-view-parse" class="hidden px-3 py-1.5 text-sm font-medium text-blue-600 hover:bg-blue-50 rounded-lg transition-colors border border-blue-200 flex items-center gap-1">
                                <i class="fa-solid fa-layer-group"></i> 解析结果
                            </button>
                            <button onclick="toggleDocEditMode(true)" class="px-3 py-1.5 text-sm font-medium text-blue-600 hover:bg-blue-50 rounded-lg transition-colors border border-blue-200 flex items-center gap-1" title="编辑文档内容">
                                <i class="fa-solid fa-pen"></i> 编辑
                            </button>
                            <div class="relative">
                                <button onclick="toggleDocMoreMenu(event)" class="px-2 py-1.5 text-sm font-medium text-gray-500 hover:bg-gray-100 rounded-lg transition-colors border border-gray-200 flex items-center gap-1">
                                    <i class="fa-solid fa-ellipsis"></i>
                                </button>
                                <div id="doc-more-menu" class="absolute right-0 top-full mt-1 w-32 bg-white border border-gray-200 rounded-lg shadow-lg hidden z-20 py-1">
                                    <button onclick="deleteCurrentDoc()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2">
                                        <i class="fa-solid fa-trash-can"></i> 删除
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div id="doc-actions-editing" class="hidden flex gap-2 items-center">
                            <button onclick="reparseCurrentDoc()" class="px-3 py-1.5 text-sm font-medium text-blue-600 hover:bg-blue-50 rounded-lg transition-colors border border-blue-200 flex items-center gap-1" title="重新解析文档内容">
                                <i class="fa-solid fa-rotate"></i> 重新解析
                            </button>
                            <div class="h-4 w-px bg-gray-300 mx-1"></div>
                            <button onclick="toggleDocEditMode(false)" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors border border-gray-200">
                                取消
                            </button>
                            <button onclick="saveDocContent()" class="px-3 py-1.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm">
                                保存
                            </button>
                        </div>
                     </div>
                </div>
                <div id="doc-preview-content" class="flex-1 overflow-y-auto p-8 prose max-w-none text-gray-600">
                    <div class="flex flex-col items-center justify-center h-full text-gray-400">
                        <i class="fa-regular fa-file-lines text-4xl mb-4"></i>
                        <p>在左侧选择文档以查看内容</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Document Confirmation Modal -->
    <div id="delete-doc-modal" class="fixed inset-0 bg-gray-900/50 hidden z-[70] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 text-center animate-fade-in-up">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">确认删除文档？</h3>
            <p class="text-sm text-gray-500 mb-6">
                您确定要永久删除该文档吗？<br>此操作不可撤销。
            </p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeDeleteDocModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors w-24">取消</button>
                <button onclick="confirmDeleteDoc()" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg shadow-sm transition-colors w-24">删除</button>
            </div>
        </div>
    </div>

    <!-- Delete KB Confirmation Modal -->
    <div id="delete-kb-modal" class="fixed inset-0 bg-gray-900/50 hidden z-[70] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 text-center animate-fade-in-up">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">确认删除知识库？</h3>
            <p class="text-sm text-gray-500 mb-6">
                您确定要永久删除该知识库吗？<br>所有关联文档也将被删除，此操作不可撤销。
            </p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeDeleteKbModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors w-24">取消</button>
                <button onclick="confirmDeleteKb()" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg shadow-sm transition-colors w-24">删除</button>
            </div>
        </div>
    </div>

    <!-- Parse Result Fullscreen Modal -->
    <div id="parse-result-modal" class="fixed inset-0 bg-gray-100 z-[60] hidden flex flex-col">
        <!-- Header -->
        <div class="bg-white border-b border-gray-200 h-14 flex items-center justify-between px-6 flex-shrink-0 shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="closeParseModal()" class="text-gray-500 hover:text-gray-800 transition-colors">
                    <i class="fa-solid fa-arrow-left text-lg"></i>
                </button>
                <h2 class="text-lg font-semibold text-gray-800" id="parse-modal-title">文档解析结果</h2>
                <span class="px-2 py-0.5 bg-green-100 text-green-700 text-xs rounded-full" id="parse-status-badge">解析完成</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center bg-gray-100 rounded-lg p-1 mr-2">
                    <button onclick="undoParseAction()" id="btn-undo" class="p-1.5 text-gray-500 hover:text-gray-800 rounded disabled:opacity-30 disabled:cursor-not-allowed" title="撤销 (Ctrl+Z)">
                        <i class="fa-solid fa-rotate-left"></i>
                    </button>
                    <button onclick="redoParseAction()" id="btn-redo" class="p-1.5 text-gray-500 hover:text-gray-800 rounded disabled:opacity-30 disabled:cursor-not-allowed" title="重做 (Ctrl+Y)">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
                
                <div class="h-6 w-px bg-gray-200 mx-1"></div>
                
                <div id="parse-save-status" class="text-xs text-gray-400 mr-2 hidden">
                    <i class="fa-solid fa-circle-notch fa-spin mr-1"></i> 保存中...
                </div>
                <span id="parse-unsaved-indicator" class="text-xs text-orange-500 font-medium hidden mr-2">● 未保存</span>
                
                <button onclick="saveParseResult()" class="px-4 py-1.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
                    保存
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 flex overflow-hidden">
            <!-- Left: Original Text -->
            <div id="parse-original-panel" class="w-1/2 border-r border-gray-200 bg-white flex flex-col transition-all duration-300">
                <div class="h-10 bg-gray-50 border-b border-gray-100 flex items-center justify-between px-4">
                    <span class="text-xs font-bold text-gray-500 uppercase">原文内容</span>
                    <button onclick="toggleOriginalPanel()" class="text-gray-400 hover:text-blue-600">
                        <i class="fa-solid fa-compress-alt"></i>
                    </button>
                </div>
                <div class="flex-1 overflow-y-auto p-6 prose max-w-none text-sm text-gray-600 bg-white" id="parse-original-content">
                    <!-- Content -->
                </div>
            </div>

            <!-- Right: Parsed Chunks -->
            <div class="flex-1 flex flex-col bg-gray-50 relative">
                <div class="h-10 bg-gray-50 border-b border-gray-200 flex items-center justify-between px-4">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-gray-500 uppercase">解析切片</span>
                        <span class="text-xs text-gray-400" id="parse-chunk-count">0 个切片</span>
                    </div>
                    <button onclick="toggleOriginalPanel()" id="btn-expand-chunks" class="hidden text-gray-400 hover:text-blue-600">
                        <i class="fa-solid fa-expand-alt"></i> 原文
                    </button>
                </div>
                
                <div class="flex-1 overflow-y-auto p-6 space-y-4" id="parse-chunks-container">
                    <!-- Chunks go here -->
                </div>
            </div>
        </div>
    </div>
