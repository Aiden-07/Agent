<div class="h-full flex flex-col bg-gray-50">
    <!-- Minimal Nav -->
    <div class="h-14 flex items-center justify-between px-6 flex-shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-2 text-sm font-medium hover:bg-gray-200/50 px-2 py-1 rounded-lg">
                <i class="fa-solid fa-arrow-left"></i>
                <span>返回列表</span>
            </button>
            <div class="h-5 w-px bg-gray-300"></div>
            <div class="flex items-center gap-2 text-sm">
                <span class="text-gray-500">当前测试知识库:</span>
                <span id="test-kb-name-display" class="font-medium text-gray-800">加载中...</span>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-hidden p-6 w-full flex flex-col">
        
        <!-- Main Layout -->
        <div class="flex-1 flex gap-6 overflow-hidden">
            
            <!-- Left Panel: Input & Settings -->
            <div class="w-1/3 max-w-md bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-gray-100 bg-gray-50">
                    <h3 class="font-semibold text-gray-800">测试配置</h3>
                </div>
                <div class="p-6 flex-1 overflow-y-auto space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">测试文本</label>
                        <textarea id="test-query-input" maxlength="1000" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-sm" style="height: 120px;" placeholder="请输入需要测试匹配的用户问题或文本片段..." oninput="document.getElementById('char-count').textContent = this.value.length"></textarea>
                        <p class="text-xs text-gray-400 mt-1 text-right"><span id="char-count">0</span>/1000</p>
                    </div>

                    <div class="space-y-4">
                        
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-sm font-medium text-gray-700">匹配阈值</label>
                                <span class="text-xs text-gray-500" id="threshold-val">0.70</span>
                            </div>
                            <!-- Assuming default comes from KB settings (0.70 for now) -->
                            <input type="range" id="test-threshold" min="0.00" max="1.00" step="0.01" value="0.70" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="document.getElementById('threshold-val').textContent = parseFloat(this.value).toFixed(2)">
                        </div>

                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-sm font-medium text-gray-700">返回结果数量 (Top K)</label>
                                <span class="text-xs text-gray-500" id="top-k-val">10</span>
                            </div>
                            <input type="range" id="test-top-k" min="1" max="20" step="1" value="10" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="document.getElementById('top-k-val').textContent = this.value">
                        </div>

                        <!-- Rerank Model Selection -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Rerank 模型</label>
                            <div class="relative">
                                <select id="rerank-model-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white">
                                    <option value="bge-reranker-large">BAAI/bge-reranker-large (推荐)</option>
                                    <option value="bge-reranker-base">BAAI/bge-reranker-base</option>
                                    <option value="mce-embedding">MCE Embedding Model</option>
                                    <option value="roberta-base">RoBERTa Base</option>
                                </select>
                            </div>
                        </div>

                        <!-- Semantic/Keyword Weight -->
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-sm font-medium text-gray-700">权重设置</label>
                                <span class="text-xs text-gray-500" id="weight-val">50</span>
                            </div>
                            <div class="mb-2 text-xs text-gray-500 bg-blue-50 p-2 rounded border border-blue-100">
                                <i class="fa-solid fa-circle-info mr-1 text-blue-400"></i>
                                调节关键字匹配与语义理解的权重占比，以优化检索结果。
                            </div>
                            <input type="range" id="test-weight" min="0" max="100" step="1" value="50" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="document.getElementById('weight-val').textContent = this.value">
                            <div class="flex justify-between text-xs text-gray-400 mt-1">
                                <span>关键字</span>
                                <span>语义</span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button onclick="runHitTest()" class="w-[120px] h-[40px] bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-all shadow-sm hover:shadow-md flex items-center justify-center gap-2">
                            <i class="fa-solid fa-play"></i> 开始测试
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Results -->
            <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <h3 class="font-semibold text-gray-800">命中结果</h3>
                        <span class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full hidden" id="result-count-badge">0 条</span>
                    </div>
                </div>
                
                <div id="test-results-container" class="flex-1 overflow-y-auto p-6 space-y-4">
                    <!-- Empty State -->
                    <div class="h-full flex flex-col items-center justify-center text-gray-400">
                        <i class="fa-solid fa-magnifying-glass-chart text-4xl mb-4 text-gray-300"></i>
                        <p>输入文本并点击“开始测试”以查看命中结果</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
