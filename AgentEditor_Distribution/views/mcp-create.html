<div class="space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <div class="text-lg font-semibold text-gray-900" id="mcp-create-title">创建MCP服务</div>
            <div class="text-sm text-gray-400">MCP服务使用Json表示，提交前请保证格式正确</div>
        </div>
        <button onclick="switchView('mcp')" class="px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
            <i class="fa-solid fa-xmark"></i>
            关闭
        </button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-6">
        <!-- 服务名称 -->
        <div>
            <div class="flex items-center justify-between mb-2">
                <label class="text-sm font-medium text-gray-700">服务名称<span class="text-red-500 ml-0.5">*</span></label>
                <span class="text-xs text-gray-400"><span id="mcp-name-count">0</span>/30</span>
            </div>
            <input id="mcp-service-name" maxlength="30" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入服务名称" oninput="updateMcpCreateCounters()">
        </div>

        <!-- 描述 -->
        <div>
            <div class="flex items-center justify-between mb-2">
                <label class="text-sm font-medium text-gray-700">描述</label>
                <span class="text-xs text-gray-400"><span id="mcp-desc-count">0</span>/100</span>
            </div>
            <textarea id="mcp-service-desc" maxlength="100" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入描述" oninput="updateMcpCreateCounters()"></textarea>
        </div>

        <!-- 安装类型 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">安装类型</label>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <label class="border border-blue-500 bg-blue-50 rounded-lg p-4 cursor-pointer flex items-center justify-between">
                    <div class="flex items-center gap-3 text-sm">
                        <div class="w-8 h-8 rounded-full bg-white text-blue-600 flex items-center justify-center border border-blue-100">
                            <i class="fa-solid fa-globe"></i>
                        </div>
                        <div class="font-medium text-gray-800">SSE</div>
                    </div>
                    <input id="mcp-install-type" type="radio" name="mcp-install-type" value="sse" checked>
                </label>
            </div>
        </div>

        <!-- MCP服务配置 -->
        <div>
            <div class="flex items-center gap-2 mb-2">
                <div class="text-sm font-medium text-gray-700">MCP服务配置</div>
                <div class="text-xs text-gray-400">MCP服务使用Json表示，提交前请保证格式正确</div>
            </div>

            <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 text-sm text-gray-600 mb-3">
                <div class="font-medium text-gray-700 mb-2">如何获取MCP服务？</div>
                <div class="space-y-2 text-xs leading-5">
                    <div>
                        <span class="font-semibold text-gray-700">MCP市场</span>
                        <a class="text-blue-600 hover:underline ml-2" href="https://modelscope.cn/mcp" target="_blank">ModelScope MCP ↗</a>
                        <a class="text-blue-600 hover:underline ml-2" href="https://mcp.so" target="_blank">MCP.so ↗</a>
                        <a class="text-blue-600 hover:underline ml-2" href="https://smithery.ai" target="_blank">Smithery ↗</a>
                    </div>
                    <div>
                        <span class="font-semibold text-gray-700">Nacos</span>
                        <a class="text-blue-600 hover:underline ml-2" href="https://nacos.io" target="_blank">Nacos MCP Registry ↗</a>
                    </div>
                    <div>
                        <span class="font-semibold text-gray-700">Higress</span>
                        <a class="text-blue-600 hover:underline ml-2" href="https://higress.io" target="_blank">Higress Open API to MCP ↗</a>
                    </div>
                </div>
            </div>

            <div class="border border-gray-200 rounded-lg overflow-hidden">
                <div class="bg-gray-50 border-b border-gray-200 px-4 py-2 text-xs text-gray-500 flex items-center justify-between">
                    <div>JSON</div>
                    <button class="text-gray-500 hover:text-gray-700" onclick="formatMcpJson()" type="button">格式化</button>
                </div>
                <div class="grid grid-cols-[44px,1fr]">
                    <div id="mcp-config-lines" class="bg-gray-50 text-gray-400 text-xs leading-5 p-3 border-r border-gray-200 select-none">1</div>
                    <textarea id="mcp-config-json" class="w-full h-[320px] p-3 text-xs font-mono leading-5 focus:outline-none" spellcheck="false" oninput="updateMcpConfigLines()" placeholder="{\n  \"mcpServers\": {\n    \"test-sse-demo\": {\n      \"type\": \"sse\",\n      \"url\": \"https://...\",\n      \"timeout\": 30000\n    }\n  }\n}"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="flex items-center gap-3">
        <button onclick="saveMcpService()" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">保存</button>
        <button onclick="switchView('mcp')" class="px-5 py-2 border border-gray-200 text-gray-700 hover:bg-gray-50 rounded-lg text-sm font-medium transition-colors">取消</button>
    </div>
</div>
