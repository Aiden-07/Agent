<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <style>
        /* Hide scrollbar for cleaner mobile view */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }
        
        /* Force text alignment override */
        #statistics-container td {
            text-align: left !important;
        }
        #statistics-container th {
            text-align: center !important;
        }
    </style>
</head>
<body class="bg-white h-screen flex flex-col overflow-hidden">
    <div id="statistics-container" class="flex-1 overflow-auto p-4 relative">
         <div class="border border-[#d9d9d9] bg-white relative">
            <table class="w-full text-sm text-left border-collapse">
                <thead class="bg-[#f5f5f5] text-[#595959] font-medium sticky top-0 z-10 shadow-[0_1px_0_#d9d9d9]"></thead>
                <tbody id="stats-table-body"></tbody>
            </table>
         </div>
    </div>
    <input id="stats-date-range" type="hidden" />
    <div id="stats-loading-mask" class="hidden absolute inset-0 bg-white/80 z-20 flex flex-col items-center justify-center">
        <i class="fa-solid fa-spinner fa-spin text-blue-500 text-3xl mb-3"></i>
        <span class="text-sm text-gray-500">正在生成数据...</span>
    </div>

    <script src="../js/statistics.js"></script>
    <script>
        // Performance Monitoring
        const start = performance.now();
        
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const lang = params.get('lang');
            
            if (lang === 'en') {
                window.StatisticsModule.setConfig({
                    headers: {
                        deptName: 'Department',
                        dialogCount: 'Dialogs',
                        userFeedback: 'Feedback',
                        like: 'Likes',
                        dislike: 'Dislikes',
                        noRating: 'No Rating',
                        satisfaction: 'Satisfaction',
                        feedbackTooltip: 'Includes Likes, Dislikes, and No Rating'
                    }
                });
            }
            
            window.StatisticsModule.init();
            
            // Measure render time
            requestAnimationFrame(() => {
                const end = performance.now();
                console.log(`Render time: ${end - start}ms`);
            });
            
            // FPS Counter (simplified)
            let frameCount = 0;
            let lastTime = performance.now();
            const loop = () => {
                const now = performance.now();
                frameCount++;
                if (now - lastTime >= 1000) {
                    console.log(`FPS: ${frameCount}`);
                    frameCount = 0;
                    lastTime = now;
                }
                requestAnimationFrame(loop);
            };
            loop();
        };
    </script>
</body>
</html>
