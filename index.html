<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAgent</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <!-- Custom Config & Styles -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                    }
                }
            }
        }
    </script>
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside id="main-sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col transition-all duration-300 z-10">
        <!-- Logo Area -->
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold mr-3">
                <i class="fa-solid fa-robot"></i>
            </div>
            <span class="text-xl font-bold text-gray-800">VAgent</span>
        </div>

        <!-- Main Navigation -->
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1 px-3">
                <div class="px-3 pt-4 pb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                    构建
                </div>

                <!-- Agent Section -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('agent')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-wand-magic-sparkles w-6 text-center mr-2"></i>
                        <span class="font-medium">智能体应用</span>
                    </a>
                </li>
                
                <!-- Orchestrator -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('orchestrator')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-layer-group w-6 text-center mr-2"></i>
                        <span class="font-medium">工作流应用</span>
                    </a>
                </li>

                <!-- Parser -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('parser')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-code w-6 text-center mr-2"></i>
                        <span class="font-medium">解析器</span>
                    </a>
                </li>
                
                <!-- Knowledge Base -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('knowledge')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-book w-6 text-center mr-2"></i>
                        <span class="font-medium">知识库</span>
                    </a>
                </li>

                <!-- Knowledge Graph (New) -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('knowledge-graph')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-project-diagram w-6 text-center mr-2"></i>
                        <span class="font-medium">知识图谱</span>
                    </a>
                </li>

                <!-- Plugins/Tools -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('components')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-puzzle-piece w-6 text-center mr-2"></i>
                        <span class="font-medium">组件</span>
                    </a>
                </li>


                <div class="px-3 pt-4 pb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                    运营
                </div>

                <!-- Evaluation -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('evaluation')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-vial w-6 text-center mr-2"></i>
                        <span class="font-medium">效果测评</span>
                    </a>
                </li>

                 <div class="px-3 pt-4 pb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                    设置
                </div>

                <!-- System Settings -->
                <li>
                    <button onclick="toggleSettingsMenu()" id="settings-menu-btn" class="w-full flex items-center justify-between px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors focus:outline-none">
                        <div class="flex items-center">
                            <i class="fa-solid fa-cog w-6 text-center mr-2"></i>
                            <span class="font-medium">系统设置</span>
                        </div>
                        <i id="settings-chevron" class="fa-solid fa-chevron-right text-xs transition-transform duration-200 text-gray-400"></i>
                    </button>
                    <!-- Submenu -->
                    <ul id="settings-submenu" class="hidden mt-1 space-y-1">
                        <li>
                            <a href="javascript:void(0)" onclick="switchView('settings-info')" class="flex items-center px-3 py-2 text-sm text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg transition-colors pl-11">
                                <span class="font-medium">企业信息</span>
                            </a>
                        </li>
                        <li>
                            <a href="javascript:void(0)" onclick="switchView('settings-logs')" class="flex items-center px-3 py-2 text-sm text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg transition-colors pl-11">
                                <span class="font-medium">系统日志</span>
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- User Management -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('user-mgmt')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-users-cog w-6 text-center mr-2"></i>
                        <span class="font-medium">用户管理</span>
                    </a>
                </li>

                <!-- Role Policy Management -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('role-mgmt')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-user-shield w-6 text-center mr-2"></i>
                        <span class="font-medium">角色管理</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- User Profile -->
        <div class="border-t border-gray-200 p-4 relative">
            <div class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 p-2 rounded-lg transition-colors" onclick="document.getElementById('user-menu').classList.toggle('hidden')">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 flex items-center justify-center text-white font-bold">
                    PM
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">Product Manager</p>
                    <p class="text-xs text-gray-500 truncate">pm@vagent.ai</p>
                </div>
                <i class="fa-solid fa-chevron-up text-gray-400 text-xs"></i>
            </div>

            <!-- Popup Menu -->
            <div id="user-menu" class="hidden absolute bottom-full left-4 right-4 mb-2 bg-white rounded-lg shadow-lg border border-gray-100 py-1 animate-fade-in z-50">
                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-blue-600">
                    <i class="fa-regular fa-user mr-2"></i> 个人中心
                </a>
                <div class="border-t border-gray-100 my-1"></div>
                <a href="javascript:logout()" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> 退出登录
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden bg-gray-50">
        <!-- Header -->
        <header id="main-header" class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <div class="flex items-center gap-4">
                <h1 id="page-title" class="text-xl font-semibold text-gray-800">仪表盘</h1>
            </div>
            <div class="flex items-center gap-4">

            </div>
        </header>

        <!-- Content Scroll Area -->
        <div id="main-content-area" class="flex-1 overflow-auto p-8 relative">
            <!-- Dynamic Content Loaded Here -->
            <div class="flex items-center justify-center h-full text-gray-400">
                <i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading...
            </div>
        </div>
    </main>

    <!-- Logout Confirm Modal -->
    <div id="logout-confirm-modal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 text-center animate-fade-in-up">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">确认退出？</h3>
            <p class="text-sm text-gray-500 mb-6">您确定要退出登录吗？</p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeModal('logout-confirm-modal')" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors w-24">取消</button>
                <button onclick="confirmLogout()" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg shadow-sm transition-colors w-24">退出</button>
            </div>
        </div>
    </div>

    <!-- Permission Config Modal (Global) -->
    <div id="permission-config-modal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
                <h3 class="text-base font-semibold text-gray-900">权限配置 - <span id="perm-agent-name"></span></h3>
                <button onclick="closeModal('permission-config-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 custom-scrollbar">
                
                <!-- Toolbar & List -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <h4 class="text-xs font-medium text-gray-900">已授权列表 (<span id="perm-total-count">0</span>)</h4>
                        <div class="flex items-center gap-2">
                            <button id="perm-undo-btn" onclick="undoLastAction()" class="hidden text-xs px-2 py-1 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded transition-colors" title="撤销上一步操作">
                                <i class="fa-solid fa-rotate-left mr-1"></i> 撤销
                            </button>
                            <button id="perm-batch-del-btn" onclick="batchRemovePermissions()" class="hidden text-xs px-2 py-1 bg-red-50 hover:bg-red-100 text-red-600 rounded transition-colors">
                                <i class="fa-solid fa-trash mr-1"></i> 批量删除
                            </button>
                            <button onclick="openPermissionSelector()" class="text-xs px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors flex items-center shadow-sm">
                                <i class="fa-solid fa-plus mr-1"></i> 添加授权
                            </button>
                        </div>
                    </div>
                    
                    <div class="border border-gray-200 rounded-lg overflow-hidden flex flex-col min-h-[300px]">
                        <div class="overflow-x-auto flex-1">
                            <table class="w-full text-xs text-left">
                                <thead class="bg-gray-50 text-gray-500 font-medium border-b border-gray-200 sticky top-0">
                                    <tr>
                                        <th class="px-4 py-3 w-1/3">授权对象</th>
                                        <th class="px-4 py-3 w-1/4">类型/部门</th>
                                        <th class="px-4 py-3 w-1/4">权限</th>
                                        <th class="px-4 py-3 text-right">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="perm-list-body" class="divide-y divide-gray-100">
                                    <!-- Dynamic Permission Rows -->
                                </tbody>
                            </table>
                        </div>
                        <div id="perm-empty-state" class="hidden flex flex-col items-center justify-center flex-1 py-10 text-gray-400">
                            <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center mb-2">
                                <i class="fa-solid fa-users-slash"></i>
                            </div>
                            <p class="text-xs">暂无特别授权</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="px-6 py-4 bg-gray-50 rounded-b-xl flex justify-between items-center border-t border-gray-100 flex-shrink-0">
                 <span class="text-xs text-green-600 hidden" id="perm-auto-save-indicator"><i class="fa-solid fa-check mr-1"></i>已实时保存</span>
            </div>
        </div>
    </div>

    <!-- Secondary Selector Modal (Global) -->
    <div id="perm-selector-modal" class="fixed inset-0 bg-gray-900/40 hidden z-[60] flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0" aria-hidden="true">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl transform scale-95 transition-all duration-300 flex flex-col max-h-[85vh]" id="perm-selector-content">
            <!-- Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <h3 class="text-base font-semibold text-gray-900">添加授权</h3>
                <button onclick="closeSelectorModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>

            <!-- Body -->
            <div class="flex flex-col flex-1 overflow-hidden">
                <!-- Search & Tabs -->
                <div class="px-6 pt-4 pb-2 space-y-3">
                    <!-- Search -->
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="selector-search-input" placeholder="搜索用户或角色..." class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition-colors">
                    </div>
                    
                    <!-- Tabs -->
                    <div class="flex border-b border-gray-200">
                        <button onclick="switchSelectorTab('user')" id="selector-tab-user" class="px-4 py-2 text-xs font-medium border-b-2 border-blue-600 text-blue-600 transition-colors">用户</button>
                        <button onclick="switchSelectorTab('role')" id="selector-tab-role" class="px-4 py-2 text-xs font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors">角色</button>
                    </div>
                </div>

                <!-- Content Area -->
                <div class="flex-1 overflow-y-auto px-6 py-2 custom-scrollbar relative">
                    <!-- Loading State -->
                    <div id="selector-loading" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center z-10">
                        <i class="fa-solid fa-spinner fa-spin text-blue-500 text-2xl"></i>
                    </div>

                    <!-- User List -->
                    <div id="selector-content-user" class="space-y-1 text-xs">
                        <!-- Dynamic User Items -->
                    </div>

                    <!-- Role List -->
                    <div id="selector-content-role" class="hidden space-y-1 text-xs">
                        <!-- Dynamic Role List -->
                    </div>
                    
                    <!-- Empty State -->
                    <div id="selector-empty" class="hidden flex flex-col items-center justify-center py-10 text-gray-400">
                        <i class="fa-solid fa-inbox text-3xl mb-2"></i>
                        <p class="text-xs">无匹配结果</p>
                    </div>
                </div>
                
                <!-- Selection Summary & Role -->
                <div class="px-6 py-3 bg-gray-50 border-t border-gray-100">
                    <div class="flex items-center justify-between mb-3">
                         <span class="text-xs text-gray-600">已选: <span id="selector-count" class="font-bold text-blue-600">0</span> 项</span>
                         <div class="flex items-center gap-2">
                            <label class="text-xs text-gray-700">权限:</label>
                            <select id="selector-role" class="text-xs border border-gray-200 rounded px-2 py-1 focus:ring-blue-500 focus:border-blue-500 bg-white">
                                <option value="view">可查看</option>
                                <option value="edit">可编辑</option>
                                <option value="manage">可管理</option>
                            </select>
                         </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3">
                <button onclick="closeSelectorModal()" class="px-4 py-2 text-xs font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
                <button onclick="confirmSelection()" class="px-4 py-2 text-xs font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors">确认添加</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js?v=1.0.2"></script>
    <script src="js/router.js?v=1.0.1"></script>
    <script src="js/settings-logs.js"></script>
    <script src="js/auth-logic.js"></script>
    <script src="js/agent.js"></script>
    <script src="js/orchestrator.js"></script>
    <script src="js/orchestrator-editor.js"></script>
    <script src="js/knowledge.js"></script>
    <script src="js/knowledge-graph.js"></script>
    <script src="js/knowledge-graph-detail.js?v=1.0.3"></script>
    <script src="js/knowledge-settings.js"></script>
    <script src="js/knowledge-testing.js"></script>
    <script src="js/components.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/evaluation.js"></script>
    <script src="js/user-mgmt.js"></script>
    <script src="js/role-mgmt.js"></script>

    <script>
        function toggleSettingsMenu() {
            const submenu = document.getElementById('settings-submenu');
            const chevron = document.getElementById('settings-chevron');
            
            if (submenu.classList.contains('hidden')) {
                submenu.classList.remove('hidden');
                chevron.classList.add('rotate-90');
            } else {
                submenu.classList.add('hidden');
                chevron.classList.remove('rotate-90');
            }
        }
    </script>
</body>
</html>
