<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAgent</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Custom Config & Styles -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                    }
                }
            }
        }
    </script>
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside id="main-sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col transition-all duration-300 z-10">
        <!-- Logo Area -->
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold mr-3">
                <i class="fa-solid fa-robot"></i>
            </div>
            <span class="text-xl font-bold text-gray-800">VAgent</span>
        </div>

        <!-- Main Navigation -->
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1 px-3">
                <!-- Dashboard -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('dashboard')" class="flex items-center px-3 py-2.5 text-blue-600 bg-blue-50 rounded-lg group">
                        <i class="fa-solid fa-chart-line w-6 text-center mr-2"></i>
                        <span class="font-medium">仪表盘</span>
                    </a>
                </li>

                <div class="px-3 pt-4 pb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                    构建
                </div>

                <!-- Agent Section -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('agent')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-wand-magic-sparkles w-6 text-center mr-2"></i>
                        <span class="font-medium">智能体</span>
                    </a>
                </li>
                
                <!-- Orchestrator -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('orchestrator')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-layer-group w-6 text-center mr-2"></i>
                        <span class="font-medium">编排器</span>
                    </a>
                </li>

                <!-- Parser -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('parser')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-code w-6 text-center mr-2"></i>
                        <span class="font-medium">解析器</span>
                    </a>
                </li>
                
                <!-- Knowledge Base -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('knowledge')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-book w-6 text-center mr-2"></i>
                        <span class="font-medium">知识库</span>
                    </a>
                </li>

                <!-- Plugins/Tools -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('components')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-puzzle-piece w-6 text-center mr-2"></i>
                        <span class="font-medium">组件</span>
                    </a>
                </li>


                <div class="px-3 pt-4 pb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                    运营
                </div>

                <!-- Evaluation -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('evaluation')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-vial w-6 text-center mr-2"></i>
                        <span class="font-medium">效果测评</span>
                    </a>
                </li>

                 <div class="px-3 pt-4 pb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                    设置
                </div>

                <!-- System Settings (TEE Dashboard) -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('settings')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-cog w-6 text-center mr-2"></i>
                        <span class="font-medium">系统设置</span>
                    </a>
                </li>

                <!-- User Management -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('user-mgmt')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-users-cog w-6 text-center mr-2"></i>
                        <span class="font-medium">用户管理</span>
                    </a>
                </li>

                <!-- Role Policy Management -->
                <li>
                    <a href="javascript:void(0)" onclick="switchView('role-mgmt')" class="flex items-center px-3 py-2.5 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg group transition-colors">
                        <i class="fa-solid fa-user-shield w-6 text-center mr-2"></i>
                        <span class="font-medium">角色管理</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- User Profile -->
        <div class="border-t border-gray-200 p-4 relative">
            <div class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 p-2 rounded-lg transition-colors" onclick="document.getElementById('user-menu').classList.toggle('hidden')">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 flex items-center justify-center text-white font-bold">
                    PM
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">Product Manager</p>
                    <p class="text-xs text-gray-500 truncate">pm@vagent.ai</p>
                </div>
                <i class="fa-solid fa-chevron-up text-gray-400 text-xs"></i>
            </div>

            <!-- Popup Menu -->
            <div id="user-menu" class="hidden absolute bottom-full left-4 right-4 mb-2 bg-white rounded-lg shadow-lg border border-gray-100 py-1 animate-fade-in z-50">
                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-blue-600">
                    <i class="fa-regular fa-user mr-2"></i> 个人中心
                </a>
                <div class="border-t border-gray-100 my-1"></div>
                <a href="javascript:logout()" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> 退出登录
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden bg-gray-50">
        <!-- Header -->
        <header id="main-header" class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <div class="flex items-center gap-4">
                <h1 id="page-title" class="text-xl font-semibold text-gray-800">仪表盘</h1>
            </div>
            <div class="flex items-center gap-4">

            </div>
        </header>

        <!-- Content Scroll Area -->
        <div id="main-content-area" class="flex-1 overflow-auto p-8 relative">
            <!-- Dynamic Content Loaded Here -->
            <div class="flex items-center justify-center h-full text-gray-400">
                <i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading...
            </div>
        </div>
    </main>

    <!-- Logout Confirm Modal -->
    <div id="logout-confirm-modal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 text-center animate-fade-in-up">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">确认退出？</h3>
            <p class="text-sm text-gray-500 mb-6">您确定要退出登录吗？</p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeModal('logout-confirm-modal')" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors w-24">取消</button>
                <button onclick="confirmLogout()" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg shadow-sm transition-colors w-24">退出</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/router.js"></script>
    <script src="js/agent.js"></script>
    <script src="js/orchestrator.js"></script>
    <script src="js/orchestrator-editor.js"></script>
    <script src="js/knowledge.js"></script>
    <script src="js/knowledge-settings.js"></script>
    <script src="js/knowledge-testing.js"></script>
    <script src="js/components.js"></script>
    <script src="js/evaluation.js"></script>
    <script src="js/user-mgmt.js"></script>
    <script src="js/doc-assistant.js"></script>
</body>
</html>
