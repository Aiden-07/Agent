<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户设置 - 企业管理系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f1115;
      --bg-secondary: #161922;
      --bg-tertiary: #1e212b;
      --bg-hover: #252a36;
      --bg-active: #2a3040;
      --accent: #e8b86d;
      --accent-hover: #f0c87a;
      --text-primary: #f0f0f0;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border: #2a3040;
      --border-light: #3a4050;
      --success: #4ade80;
      --danger: #f87171;
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ============ 左侧菜单栏 ============ */
    .sidebar {
      width: 260px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
    }

    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, #d4a056 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: var(--bg-primary);
      font-family: 'Playfair Display', serif;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-section {
      padding: 20px 16px;
      flex: 1;
      overflow-y: auto;
    }

    .nav-group {
      margin-bottom: 24px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 0 12px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 2px;
      position: relative;
    }

    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--bg-active);
      color: var(--text-primary);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 20px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ============ 底部用户信息区域 ============ */
    .user-section {
      padding: 16px;
      border-top: 1px solid var(--border);
      position: relative;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .user-card:hover {
      background: var(--bg-hover);
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 15px;
      color: white;
      flex-shrink: 0;
      position: relative;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-avatar .status-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      background: var(--success);
      border: 2px solid var(--bg-secondary);
      border-radius: 50%;
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-role {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .user-arrow {
      color: var(--text-muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .user-card.open .user-arrow {
      transform: rotate(180deg);
    }

    /* ============ Tips 弹窗 ============ */
    .user-dropdown {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 16px;
      right: 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 8px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
    }

    .user-dropdown.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .user-dropdown::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 6px solid var(--bg-tertiary);
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .dropdown-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .dropdown-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .dropdown-divider {
      height: 1px;
      background: var(--border);
      margin: 6px 8px;
    }

    .dropdown-item.danger {
      color: var(--danger);
    }

    .dropdown-item.danger:hover {
      background: rgba(248, 113, 113, 0.1);
    }

    /* ============ 主内容区域 ============ */
    .main-content {
      flex: 1;
      overflow-y: auto;
      background: var(--bg-primary);
    }

    .content-header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid var(--border);
    }

    .content-header h1 {
      font-size: 28px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      margin-bottom: 6px;
    }

    .content-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .content-body {
      padding: 32px 40px;
      max-width: 720px;
    }

    /* ============ 设置卡片 ============ */
    .settings-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
      transition: border-color 0.2s ease;
    }

    .settings-card:hover {
      border-color: var(--border-light);
    }

    .settings-card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .settings-card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    /* ============ 基本信息区域 ============ */
    
    /* 头像设置 */
    .avatar-section {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 28px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .avatar-preview {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 600;
      color: white;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      cursor: pointer;
    }

    .avatar-preview:hover .avatar-overlay {
      opacity: 1;
    }

    .avatar-overlay svg {
      width: 24px;
      height: 24px;
      color: white;
    }

    .avatar-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-light);
    }

    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-outline:hover {
      background: rgba(232, 184, 109, 0.1);
    }

    .avatar-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ============ 表单样式 ============ */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .form-label .required {
      color: var(--danger);
      margin-left: 2px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 184, 109, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ============ 密码状态显示 ============ */
    .password-status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .password-status-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(74, 222, 128, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--success);
      flex-shrink: 0;
    }

    .password-status-icon svg {
      width: 20px;
      height: 20px;
    }

    .password-status-text {
      flex: 1;
    }

    .password-status-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .password-status-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ============ 保存按钮区域 ============ */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    /* ============ 隐藏文件输入 ============ */
    #avatarInput {
      display: none;
    }

    /* ============ 滚动条美化 ============ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-light);
    }

    /* ============ 动画 ============ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-in-delay-1 { animation-delay: 0.05s; opacity: 0; }
    .animate-in-delay-2 { animation-delay: 0.1s; opacity: 0; }

    /* ============ 提示消息 ============ */
    .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 14px 20px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      z-index: 1000;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .toast-success .toast-icon {
      background: rgba(74, 222, 128, 0.15);
      color: var(--success);
    }

    .toast-error .toast-icon {
      background: rgba(248, 113, 113, 0.15);
      color: var(--danger);
    }

    /* ============ 修改密码弹窗 ============ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95) translateY(10px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.show .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 17px;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .modal-close svg {
      width: 18px;
      height: 18px;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-body .form-group {
      margin-bottom: 18px;
    }

    .modal-body .form-group:last-child {
      margin-bottom: 0;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 20px 24px;
      border-top: 1px solid var(--border);
    }

    /* ============ 密码强度 ============ */
    .password-strength {
      margin-top: 8px;
    }

    .strength-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
      gap: 4px;
    }

    .strength-segment {
      flex: 1;
      border-radius: 2px;
      transition: background 0.3s ease;
    }

    .strength-segment.weak { background: var(--danger); }
    .strength-segment.medium { background: var(--accent); }
    .strength-segment.strong { background: var(--success); }

    .strength-text {
      font-size: 12px;
      margin-top: 6px;
      color: var(--text-muted);
    }

    /* ============ 密码输入框包装器 ============ */
    .password-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-input-wrapper .form-input {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .password-toggle:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>

    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">A</div>
        <div>
          <div class="logo-text">AdminPro</div>
          <div class="logo-sub">企业管理系统</div>
        </div>
      </div>
    </div>

    <nav class="nav-section">
      <div class="nav-group">
        <div class="nav-label">工作台</div>

        </div>

          消息中心
        </div>

          文档管理
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-label">业务管理</div>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          客户管理
        </div>
        <div class="nav-item">

          财务管理
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          订单管理
        </div>
      </div>

      <div class="nav-group">

  <div class="toast" id="toast">

  <script>
    // 用户下拉菜单切换
    function toggleDropdown(event) {
      event.stopPropagation();
      const dropdown = document.getElementById('userDropdown');
      const card = document.getElementById('userCard');
      dropdown.classList.toggle('show');
      card.classList.toggle('open');
    }

    // 点击外部关闭下拉菜单
    document.addEventListener('click', function(event) {
      const dropdown = document.getElementById('userDropdown');
      const card = document.getElementById('userCard');
      if (!card.contains(event.target)) {
        dropdown.classList.remove('show');
        card.classList.remove('open');
      }
    });

    // 前往个人中心
    function goToProfile() {
      document.getElementById('userDropdown').classList.remove('show');
      document.getElementById('userCard').classList.remove('open');
      showToast('已切换到个人中心', 'success');
      document.querySelector('.main-content').scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 退出登录
    function logout() {
      document.getElementById('userDropdown').classList.remove('show');
      document.getElementById('userCard').classList.remove('open');
      showToast('正在退出登录...', 'success');
      setTimeout(() => {
        // window.location.href = '/login';
      }, 1500);
    }

    // 头像上传处理
    function handleAvatarUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        showToast('文件大小不能超过 5MB', 'error');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const preview = document.getElementById('avatarPreview');
        const sidebarAvatar = document.querySelector('.user-avatar');

        // 更新主区域头像
        preview.innerHTML = `<img src="${e.target.result}" alt="头像"><div class="avatar-overlay" onclick="document.getElementById('avatarInput').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>`;

        // 更新侧边栏头像
        sidebarAvatar.innerHTML = `<img src="${e.target.result}" alt="头像" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"><div class="status-dot"></div>`;

        showToast('头像上传成功', 'success');
      };
      reader.readAsDataURL(file);
    }

    // 删除头像
    function removeAvatar() {
      const preview = document.getElementById('avatarPreview');
      const sidebarAvatar = document.querySelector('.user-avatar');

      preview.innerHTML = `<span id="avatarText">张</span><div class="avatar-overlay" onclick="document.getElementById('avatarInput').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>`;

      sidebarAvatar.innerHTML = `<span id="sidebarAvatarText">张</span><div class="status-dot"></div>`;

      showToast('头像已删除', 'success');
    }

    // ============ 用户名编辑切换 ============
    let isUsernameEditing = false;

    function toggleUsernameEdit() {
      const input = document.getElementById('username');
      const btn = document.getElementById('usernameBtn');
      const btnText = document.getElementById('usernameBtnText');

      if (!isUsernameEditing) {
        // 进入编辑状态
        input.disabled = false;
        input.focus();
        btnText.textContent = '保存';
        btn.classList.remove('btn-outline');
        btn.classList.add('btn-primary');
        isUsernameEditing = true;
      } else {
        // 保存并退出编辑状态
        const username = input.value.trim();
        if (!username) {
          showToast('请输入用户名', 'error');
          return;
        }

        // 更新侧边栏用户名
        document.querySelector('.user-name').textContent = username;
        
        // 更新头像首字
        const firstChar = username.charAt(0);
        document.getElementById('avatarText').textContent = firstChar;

        // 退出编辑状态
        input.disabled = true;
        btnText.textContent = '编辑';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline');
        isUsernameEditing = false;

        showToast('用户名已保存', 'success');
      }
    }

    // ============ 邮箱编辑切换 ============
    let isEmailEditing = false;

    function toggleEmailEdit() {
      const input = document.getElementById('email');
      const btn = document.getElementById('emailBtn');
      const btnText = document.getElementById('emailBtnText');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!isEmailEditing) {
        // 进入编辑状态
        input.disabled = false;
        input.focus();
        btnText.textContent = '保存';
        btn.classList.remove('btn-outline');
        btn.classList.add('btn-primary');
        isEmailEditing = true;
      } else {
        // 保存并退出编辑状态
        const email = input.value.trim();
        if (!email) {
          showToast('请输入电子邮箱', 'error');
          return;
        }
        if (!emailRegex.test(email)) {
          showToast('请输入有效的邮箱地址', 'error');
          return;
        }

        // 退出编辑状态
        input.disabled = true;
        btnText.textContent = '编辑';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline');
        isEmailEditing = false;

        showToast('邮箱已保存', 'success');
      }
    }

    // ============ 密码弹窗相关 ============
    function openPasswordModal() {
      const modal = document.getElementById('passwordModal');
      modal.classList.add('show');
      // 清空表单
      document.getElementById('oldPassword').value = '';
      document.getElementById('modalNewPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      resetModalStrength();
    }

    function closePasswordModal() {
      const modal = document.getElementById('passwordModal');
      modal.classList.remove('show');
    }

    // 切换密码显示/隐藏
    function togglePasswordVisibility(inputId, btn) {
      const input = document.getElementById(inputId);
      const eyeOpen = btn.querySelector('.eye-open');
      const eyeClosed = btn.querySelector('.eye-closed');

      if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.style.display = 'none';
        eyeClosed.style.display = 'block';
      } else {
        input.type = 'password';
        eyeOpen.style.display = 'block';
        eyeClosed.style.display = 'none';
      }
    }

    // 点击遮罩层关闭弹窗
    document.getElementById('passwordModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closePasswordModal();
      }
    });

    function resetModalStrength() {
      const segments = ['modal-seg1', 'modal-seg2', 'modal-seg3'].map(id => document.getElementById(id));
      segments.forEach(s => s.className = 'strength-segment');
      document.getElementById('modalStrengthText').textContent = '密码强度：请输入密码';
    }

    function checkModalStrength(password) {
      const segments = ['modal-seg1', 'modal-seg2', 'modal-seg3'].map(id => document.getElementById(id));
      const text = document.getElementById('modalStrengthText');

      segments.forEach(s => s.className = 'strength-segment');

      if (!password) {
        text.textContent = '密码强度：请输入密码';
        return;
      }

      if (password.length < 8) {
        text.textContent = '密码强度：密码长度不足8位';
        return;
      }

      // 统计字符类型
      let typeCount = 0;
      const hasLower = /[a-z]/.test(password);
      const hasUpper = /[A-Z]/.test(password);
      const hasDigit = /\d/.test(password);
      const hasSpecial = /[^a-zA-Z0-9]/.test(password);

      if (hasLower || hasUpper) typeCount++; // 字母
      if (hasDigit) typeCount++;             // 数字
      if (hasSpecial) typeCount++;           // 符号

      // 三级强度：1种=低，2种=中，3种=高
      const levels = [
        { color: 'weak', label: '密码强度：低' },
        { color: 'medium', label: '密码强度：中' },
        { color: 'strong', label: '密码强度：高' }
      ];

      const level = levels[typeCount - 1] || levels[0];

      // 根据强度级别填充对应数量的条
      const fillCount = typeCount;
      for (let i = 0; i < fillCount; i++) {
        segments[i].classList.add(level.color);
      }

      text.textContent = level.label;
    }

    function submitPasswordChange() {
      const oldPwd = document.getElementById('oldPassword').value;
      const newPwd = document.getElementById('modalNewPassword').value;
      const confirmPwd = document.getElementById('confirmPassword').value;

      if (!oldPwd) {
        showToast('请输入原始密码', 'error');
        return;
      }
      if (!newPwd) {
        showToast('请输入新密码', 'error');
        return;
      }
      if (newPwd.length < 8) {
        showToast('新密码长度至少8位', 'error');
        return;
      }
      if (newPwd !== confirmPwd) {
        showToast('两次输入的新密码不一致', 'error');
        return;
      }

      closePasswordModal();
      showToast('密码修改成功', 'success');
    }

    // Toast 提示
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');

      toast.className = 'toast toast-' + type;
      toastMessage.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>

  <input type="file" id="avatarInput" accept="image/jpeg,image/png" onchange="handleAvatarUpload(event)" style="display:none;">
</body>
</html>
