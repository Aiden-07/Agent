<div class="space-y-6">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button onclick="switchView('mcp')" class="px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i>
                返回
            </button>
            <div>
                <div class="text-lg font-semibold text-gray-900" id="mcp-detail-name">-</div>
                <div class="text-sm text-gray-400" id="mcp-detail-id">-</div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="editMcpFromDetail()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
                编辑
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 lg:col-span-1">
            <div class="text-sm font-semibold text-gray-800 mb-4">基础信息</div>
            <div class="space-y-4 text-sm">
                <div>
                    <div class="text-gray-400 mb-1">描述</div>
                    <div class="text-gray-800" id="mcp-detail-desc">-</div>
                </div>
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-gray-400 mb-1">状态</div>
                        <div id="mcp-detail-status"></div>
                    </div>
                    <button id="mcp-detail-toggle-btn" onclick="toggleMcpFromDetail()" class="px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
                        -
                    </button>
                </div>
                <div>
                    <div class="text-gray-400 mb-1">安装类型</div>
                    <div class="text-gray-800" id="mcp-detail-install">-</div>
                </div>
                <div>
                    <div class="text-gray-400 mb-1">创建时间</div>
                    <div class="text-gray-800" id="mcp-detail-created">-</div>
                </div>
                <div>
                    <div class="text-gray-400 mb-1">最后更新时间</div>
                    <div class="text-gray-800" id="mcp-detail-updated">-</div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 lg:col-span-2">
            <div class="flex items-center justify-between mb-4">
                <div class="text-sm font-semibold text-gray-800">MCP服务配置</div>
                <button onclick="copyMcpConfig()" class="px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                    <i class="fa-solid fa-copy"></i>
                    复制
                </button>
            </div>
            <pre class="bg-gray-50 border border-gray-200 rounded-lg p-4 text-xs overflow-auto min-h-[280px]"><code id="mcp-detail-config" class="language-json">-</code></pre>
        </div>
    </div>
</div>
