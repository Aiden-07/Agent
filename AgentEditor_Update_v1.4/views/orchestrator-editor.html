<div class="flex flex-col h-screen bg-gray-50">
    <!-- Top Navigation -->
    <header class="bg-white h-14 border-b border-gray-200 flex items-center justify-between px-4 flex-shrink-0 z-20">
        <div class="flex items-center gap-4">
            <button onclick="goBackFromOrchestrator()" class="text-gray-500 hover:text-gray-700 px-2 py-1 rounded hover:bg-gray-100 transition-colors flex items-center gap-2 text-sm">
                <i class="fa-solid fa-chevron-left"></i>
                返回
            </button>
            <div class="h-6 w-px bg-gray-200"></div>
            <div class="flex items-center gap-2 group">
                <input type="text" id="orch-editor-name" class="font-medium text-gray-800 border-transparent border-b-2 hover:border-gray-300 focus:border-blue-500 focus:outline-none bg-transparent px-1 py-0.5 transition-colors" value="未命名工作流">
                <i class="fa-solid fa-pen text-gray-300 text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <span class="text-xs text-gray-400" id="orch-save-status">已保存</span>
            <button onclick="publishOrchestrator()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                发布
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 flex overflow-hidden">
        <!-- Left Panel: Node Library -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 z-10">
            <div class="p-4 border-b border-gray-100">
                <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">组件库</h3>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                
                <!-- Category: AI & Logic -->
                <div>
                    <div class="text-xs font-medium text-gray-400 mb-3 pl-1">核心能力</div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="draggable-node p-3 bg-purple-50 border border-purple-100 rounded-lg cursor-move hover:shadow-md transition-all flex flex-col items-center gap-2" draggable="true">
                            <div class="w-8 h-8 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                            </div>
                            <span class="text-xs text-gray-600">大模型</span>
                        </div>
                        <div class="draggable-node p-3 bg-blue-50 border border-blue-100 rounded-lg cursor-move hover:shadow-md transition-all flex flex-col items-center gap-2" draggable="true">
                            <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                                <i class="fa-solid fa-book"></i>
                            </div>
                            <span class="text-xs text-gray-600">知识库</span>
                        </div>
                    </div>
                </div>

                <!-- Category: Flow Control -->
                <div>
                    <div class="text-xs font-medium text-gray-400 mb-3 pl-1">流程控制</div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="draggable-node p-3 bg-orange-50 border border-orange-100 rounded-lg cursor-move hover:shadow-md transition-all flex flex-col items-center gap-2" draggable="true">
                            <div class="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center">
                                <i class="fa-solid fa-code-branch"></i>
                            </div>
                            <span class="text-xs text-gray-600">条件判断</span>
                        </div>
                        <div class="draggable-node p-3 bg-orange-50 border border-orange-100 rounded-lg cursor-move hover:shadow-md transition-all flex flex-col items-center gap-2" draggable="true">
                            <div class="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center">
                                <i class="fa-solid fa-rotate"></i>
                            </div>
                            <span class="text-xs text-gray-600">循环</span>
                        </div>
                        <div class="draggable-node p-3 bg-indigo-50 border border-indigo-100 rounded-lg cursor-move hover:shadow-md transition-shadow flex flex-col items-center gap-2" draggable="true" data-node-type="dialog-interaction">
                            <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center">
                                <i class="fa-solid fa-circle-question" aria-hidden="true"></i>
                            </div>
                            <span class="text-xs text-gray-600">对话交互</span>
                        </div>
                    </div>
                </div>

                <!-- Category: Tools -->
                <div>
                    <div class="text-xs font-medium text-gray-400 mb-3 pl-1">工具集成</div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="draggable-node p-3 bg-green-50 border border-green-100 rounded-lg cursor-move hover:shadow-md transition-all flex flex-col items-center gap-2" draggable="true" data-node-type="api">
                            <div class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                                <i class="fa-solid fa-globe"></i>
                            </div>
                            <span class="text-xs text-gray-600">API</span>
                        </div>
                        <div class="draggable-node p-3 bg-green-50 border border-green-100 rounded-lg cursor-move hover:shadow-md transition-all flex flex-col items-center gap-2" draggable="true" data-node-type="mcp">
                            <div class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                                <i class="fa-solid fa-layer-group"></i>
                            </div>
                            <span class="text-xs text-gray-600">MCP</span>
                        </div>
                        <div class="draggable-node p-3 bg-green-50 border border-green-100 rounded-lg cursor-move hover:shadow-md transition-all flex flex-col items-center gap-2" draggable="true" data-node-type="app-component">
                            <div class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                                <i class="fa-solid fa-cubes"></i>
                            </div>
                            <span class="text-xs text-gray-600">应用组件</span>
                        </div>
                        <div class="draggable-node p-3 bg-green-50 border border-green-100 rounded-lg cursor-move hover:shadow-md transition-all flex flex-col items-center gap-2" draggable="true" data-node-type="skill">
                            <div class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                            </div>
                            <span class="text-xs text-gray-600">Skill</span>
                        </div>
                    </div>
                </div>

            </div>
        </aside>

        <!-- Right Panel: Canvas -->
        <main class="flex-1 bg-gray-100 relative overflow-hidden cursor-grab active:cursor-grabbing" id="orch-canvas">
            <!-- Background Grid -->
            <div class="absolute inset-0 opacity-10" 
                 style="background-image: radial-gradient(#6b7280 1px, transparent 1px); background-size: 20px 20px;">
            </div>

            <!-- Toolbar -->
            <div class="absolute bottom-6 right-6 flex flex-col gap-2 bg-white rounded-lg shadow-md border border-gray-200 p-1">
                <button class="p-2 text-gray-500 hover:text-blue-600 hover:bg-gray-50 rounded transition-colors" title="放大">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <button class="p-2 text-gray-500 hover:text-blue-600 hover:bg-gray-50 rounded transition-colors" title="缩小">
                    <i class="fa-solid fa-minus"></i>
                </button>
                <button class="p-2 text-gray-500 hover:text-blue-600 hover:bg-gray-50 rounded transition-colors" title="适应屏幕">
                    <i class="fa-solid fa-compress"></i>
                </button>
            </div>

            <!-- Mock Flow Nodes (Centered) -->
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center gap-8">
                
                <!-- Input Node -->
                <div class="relative group cursor-pointer" onclick="openNodeSettings('input')">
                    <div class="w-40 bg-white rounded-lg shadow-sm border border-gray-200 p-3 flex flex-col gap-2 hover:border-blue-500 hover:shadow-md transition-all">
                        <div class="flex items-center gap-2 border-b border-gray-100 pb-2">
                            <div class="w-6 h-6 rounded bg-gray-100 text-gray-600 flex items-center justify-center text-xs">
                                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                            </div>
                            <span class="text-sm font-medium text-gray-800">开始输入</span>
                        </div>
                        <div class="text-xs text-gray-400">用户输入参数</div>
                    </div>
                    <!-- Connector Line -->
                    <div class="absolute top-1/2 -right-8 w-8 h-0.5 bg-gray-300"></div>
                    <div class="absolute top-1/2 -right-2 w-2 h-2 border-t-2 border-r-2 border-gray-300 transform rotate-45 -mt-1"></div>
                </div>

                <!-- Knowledge Base Node -->
                <div class="relative group cursor-pointer" onclick="openNodeSettings('knowledge')">
                    <div class="w-40 bg-white rounded-lg shadow-sm border border-gray-200 p-3 flex flex-col gap-2 hover:border-blue-500 hover:shadow-md transition-all">
                        <div class="flex items-center gap-2 border-b border-gray-100 pb-2">
                            <div class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center text-xs">
                                <i class="fa-solid fa-book"></i>
                            </div>
                            <span class="text-sm font-medium text-gray-800">检索知识库</span>
                        </div>
                        <div class="text-xs text-gray-400">Query Retrieval</div>
                    </div>
                    <!-- Connector Line -->
                    <div class="absolute top-1/2 -right-8 w-8 h-0.5 bg-gray-300"></div>
                    <div class="absolute top-1/2 -right-2 w-2 h-2 border-t-2 border-r-2 border-gray-300 transform rotate-45 -mt-1"></div>
                </div>

                <!-- LLM Node -->
                <div class="relative group cursor-pointer" onclick="openNodeSettings('llm')">
                    <div class="w-40 bg-white rounded-lg shadow-sm border border-gray-200 p-3 flex flex-col gap-2 hover:border-blue-500 hover:shadow-md transition-all">
                        <div class="flex items-center gap-2 border-b border-gray-100 pb-2">
                            <div class="w-6 h-6 rounded bg-purple-100 text-purple-600 flex items-center justify-center text-xs">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                            </div>
                            <span class="text-sm font-medium text-gray-800">大模型处理</span>
                        </div>
                        <div class="text-xs text-gray-400">GPT-4 (Main)</div>
                    </div>
                     <!-- Connector Line -->
                    <div class="absolute top-1/2 -right-8 w-8 h-0.5 bg-gray-300"></div>
                    <div class="absolute top-1/2 -right-2 w-2 h-2 border-t-2 border-r-2 border-gray-300 transform rotate-45 -mt-1"></div>
                </div>

                <!-- Optimize Node (Logic) -->
                <div class="relative group cursor-pointer" onclick="openNodeSettings('optimize')">
                    <div class="w-40 bg-white rounded-lg shadow-sm border border-gray-200 p-3 flex flex-col gap-2 hover:border-blue-500 hover:shadow-md transition-all">
                        <div class="flex items-center gap-2 border-b border-gray-100 pb-2">
                            <div class="w-6 h-6 rounded bg-orange-100 text-orange-600 flex items-center justify-center text-xs">
                                <i class="fa-solid fa-code-branch"></i>
                            </div>
                            <span class="text-sm font-medium text-gray-800">结果优化</span>
                        </div>
                        <div class="text-xs text-gray-400">格式校验与重试</div>
                    </div>
                     <!-- Connector Line -->
                    <div class="absolute top-1/2 -right-8 w-8 h-0.5 bg-gray-300"></div>
                    <div class="absolute top-1/2 -right-2 w-2 h-2 border-t-2 border-r-2 border-gray-300 transform rotate-45 -mt-1"></div>
                </div>

                <!-- Output Node -->
                <div class="relative group cursor-pointer" onclick="openNodeSettings('output')">
                    <div class="w-40 bg-white rounded-lg shadow-sm border border-gray-200 p-3 flex flex-col gap-2 hover:border-blue-500 hover:shadow-md transition-all">
                        <div class="flex items-center gap-2 border-b border-gray-100 pb-2">
                            <div class="w-6 h-6 rounded bg-gray-100 text-gray-600 flex items-center justify-center text-xs">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                            </div>
                            <span class="text-sm font-medium text-gray-800">最终输出</span>
                        </div>
                        <div class="text-xs text-gray-400">JSON Response</div>
                    </div>
                </div>

            </div>

            <!-- Settings Drawer -->
            <aside id="node-settings-drawer" class="absolute top-0 right-0 h-full w-[480px] bg-white shadow-lg border-l border-gray-200 transform translate-x-full transition-transform duration-300 flex flex-col z-20">
                <div class="h-14 border-b border-gray-200 flex items-center justify-between px-4 bg-gray-50">
                    <h3 class="font-medium text-gray-800" id="drawer-title">节点设置</h3>
                    <button onclick="closeNodeSettings()" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                
                <div class="flex-1 overflow-y-auto p-4" id="drawer-content">
                    <!-- Dynamic Content -->
                </div>
            </aside>
        </main>

        <!-- Component Picker Modal (for dragging "应用组件" into canvas) -->
        <div id="orch-component-picker-modal" class="fixed inset-0 bg-black/20 hidden z-[100] items-center justify-center">
            <div class="bg-white rounded-xl shadow-2xl w-[860px] max-w-[95vw] h-[560px] max-h-[90vh] flex flex-col">
                <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                    <div class="text-lg font-semibold text-gray-900" id="orch-comp-picker-title">选择应用组件</div>
                    <button class="text-gray-400 hover:text-gray-600" onclick="closeOrchComponentPicker()">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>

                <div class="px-6 pt-4">
                    <div class="flex items-center gap-2">
                        <button id="orch-comp-tab-agent" class="px-3 py-1.5 text-sm rounded-md bg-blue-50 text-blue-600 font-medium" onclick="switchOrchComponentTab('agent')">智能体组件</button>
                        <button id="orch-comp-tab-orchestrator" class="px-3 py-1.5 text-sm rounded-md text-gray-600 hover:bg-gray-50" onclick="switchOrchComponentTab('orchestrator')">工作流组件</button>
                        <button id="orch-comp-tab-plugin" class="px-3 py-1.5 text-sm rounded-md text-gray-600 hover:bg-gray-50" onclick="switchOrchComponentTab('plugin')">插件</button>
                        <button id="orch-comp-tab-skill" class="px-3 py-1.5 text-sm rounded-md text-gray-600 hover:bg-gray-50" onclick="switchOrchComponentTab('skill')">Skill</button>
                    </div>
                </div>

                <div class="px-6 pt-4 flex items-center justify-between gap-4">
                    <div class="relative w-56">
                        <input id="orch-comp-search" type="text" class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="搜索组件名称" oninput="renderOrchComponentList()">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    </div>
                    <button class="px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2" onclick="goToComponentsCreateFromPicker()">
                        <i class="fa-solid fa-plus text-gray-600"></i>
                        <span id="orch-comp-add-btn-text">添加智能体组件</span>
                    </button>
                </div>

                <div class="flex-1 px-6 py-4 overflow-auto">
                    <div id="orch-comp-list" class="grid grid-cols-2 gap-3"></div>

                    <div id="orch-comp-empty" class="hidden h-full flex flex-col items-center justify-center text-center">
                        <div class="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center text-gray-300 mb-4">
                            <i class="fa-solid fa-box-open text-4xl"></i>
                        </div>
                        <div class="text-gray-700 font-semibold mb-1">暂无可选组件</div>
                        <div class="text-sm text-gray-400 mb-4">请先前往组件管理页面进行组件创建</div>
                        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium" onclick="goToComponentsCreateFromPicker()">前往创建</button>
                    </div>
                </div>

                <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-end gap-3">
                    <button class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg" onclick="closeOrchComponentPicker()">取消</button>
                    <button id="orch-comp-confirm" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed" onclick="confirmOrchComponentPicker()" disabled>确定</button>
                </div>
            </div>
        </div>
    </div>
</div>
