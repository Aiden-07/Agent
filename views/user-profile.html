<div class="animate-fade-in max-w-4xl space-y-6">
    <!-- Page Header -->
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-xl font-semibold text-gray-900">个人中心</h2>
            <p class="text-sm text-gray-500 mt-1">管理您的个人资料与账户安全</p>
        </div>
    </div>

    <!-- ============ 基本信息区域 ============ -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <div class="mb-5">
            <h3 class="text-base font-semibold text-gray-900">基本信息</h3>
            <p class="text-sm text-gray-500 mt-1">管理您的头像与姓名信息</p>
        </div>

        <!-- 头像设置 -->
        <div class="flex items-center gap-6 pb-6 mb-6 border-b border-gray-100">
            <div class="relative w-24 h-24 rounded-full overflow-hidden flex-shrink-0 bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white text-3xl font-semibold shadow-sm group cursor-pointer" id="avatarPreview" onclick="openProfileAvatarPreview()">
                <span id="avatarText">P</span>
                <div class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <i class="fa-solid fa-magnifying-glass-plus text-white text-xl"></i>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2">
                    <button class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm" onclick="document.getElementById('avatarInput').click()">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        上传新头像
                    </button>
                    <button class="px-4 py-2 bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 hover:text-gray-800 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm" onclick="removeAvatar()">
                        <i class="fa-regular fa-trash-can"></i>
                        删除头像
                    </button>
                </div>
                <div class="text-xs text-gray-400">支持 JPG、PNG 格式，文件大小不超过 5MB</div>
            </div>
        </div>

        <!-- 用户名设置 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">用户名 <span class="text-red-500">*</span></label>
            <div class="flex gap-3 items-center">
                <input type="text" id="profileUsername" value="Product Manager" placeholder="请输入用户名" maxlength="30" disabled class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-700 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all disabled:cursor-not-allowed disabled:opacity-70">
                <button id="usernameBtn" onclick="toggleProfileUsernameEdit()" class="px-4 py-2.5 border border-blue-600 text-blue-600 hover:bg-blue-50 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 flex-shrink-0">
                    <i class="fa-regular fa-pen-to-square"></i>
                    <span id="usernameBtnText">编辑</span>
                </button>
            </div>
            <p class="text-xs text-gray-400 mt-1.5">这是您在系统中显示的名称</p>
        </div>
    </div>

    <!-- ============ 账户安全区域 ============ -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <div class="mb-5">
            <h3 class="text-base font-semibold text-gray-900">账户安全</h3>
            <p class="text-sm text-gray-500 mt-1">管理您的邮箱与密码设置</p>
        </div>

        <!-- 邮箱设置 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">电子邮箱</label>
            <div class="flex gap-3 items-center">
                <input type="email" id="profileEmail" value="pm@vagent.ai" placeholder="请输入电子邮箱" maxlength="254" disabled class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-700 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all disabled:cursor-not-allowed disabled:opacity-70">
                <button id="emailBtn" onclick="toggleProfileEmailEdit()" class="px-4 py-2.5 border border-blue-600 text-blue-600 hover:bg-blue-50 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 flex-shrink-0">
                    <i class="fa-regular fa-pen-to-square"></i>
                    <span id="emailBtnText">编辑</span>
                </button>
            </div>
            
        </div>

        <!-- 密码设置 -->
        <div class="mt-6 pt-6 border-t border-gray-100">
            <label class="block text-sm font-medium text-gray-700 mb-2">登录密码</label>
            <div class="flex items-center gap-4 p-4 border border-gray-200 rounded-lg bg-gray-50">
                <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center text-green-500 flex-shrink-0">
                    <i class="fa-solid fa-check text-lg"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium text-gray-900">密码已设置</div>
                    <div class="text-xs text-gray-500 mt-0.5">上次修改于 2026年3月15日</div>
                </div>
                <button class="px-4 py-2 border border-blue-600 text-blue-600 hover:bg-blue-50 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 flex-shrink-0" onclick="openProfilePasswordModal()">
                    <i class="fa-regular fa-pen-to-square"></i>
                    修改密码
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ============ 修改密码弹窗 ============ -->
<div id="profilePasswordModal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm" onclick="if(event.target===this) closeProfilePasswordModal()">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
            <h3 class="text-base font-semibold text-gray-900">修改密码</h3>
            <button onclick="closeProfilePasswordModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="p-6 overflow-y-auto flex-1 custom-scrollbar space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">原始密码 <span class="text-red-500">*</span></label>
                <div class="relative">
                    <input type="password" id="oldPassword" placeholder="请输入当前密码" maxlength="30" class="w-full px-4 py-2.5 pr-11 border border-gray-200 rounded-lg text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <button type="button" class="absolute right-2 top-1/2 transform -translate-y-1/2 w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-600 rounded transition-colors" onclick="toggleProfilePasswordVisibility('oldPassword', this)">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">新密码 <span class="text-red-500">*</span></label>
                <div class="relative">
                    <input type="password" id="modalNewPassword" placeholder="请输入新密码" maxlength="30" oninput="checkProfilePasswordStrength(this.value)" class="w-full px-4 py-2.5 pr-11 border border-gray-200 rounded-lg text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <button type="button" class="absolute right-2 top-1/2 transform -translate-y-1/2 w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-600 rounded transition-colors" onclick="toggleProfilePasswordVisibility('modalNewPassword', this)">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <div class="mt-2">
                    <div class="flex gap-1.5">
                        <div id="modal-seg1" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
                        <div id="modal-seg2" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
                        <div id="modal-seg3" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
                    </div>
                    <div id="modalStrengthText" class="text-xs text-gray-400 mt-1.5">密码强度：请输入密码</div>
                    <div class="text-[11px] text-gray-400 mt-1">请使用：字母+数字+特殊符号</div>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">重复新密码 <span class="text-red-500">*</span></label>
                <div class="relative">
                    <input type="password" id="confirmPassword" placeholder="请再次输入新密码" maxlength="30" class="w-full px-4 py-2.5 pr-11 border border-gray-200 rounded-lg text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <button type="button" class="absolute right-2 top-1/2 transform -translate-y-1/2 w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-600 rounded transition-colors" onclick="toggleProfilePasswordVisibility('confirmPassword', this)">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="px-6 py-4 bg-gray-50 rounded-b-xl flex justify-end gap-3 border-t border-gray-100 flex-shrink-0">
            <button onclick="closeProfilePasswordModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
            <button onclick="submitProfilePasswordChange()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors flex items-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i>
                确认修改
            </button>
        </div>
    </div>
</div>

<!-- ============ 头像大图预览弹窗 ============ -->
<div id="profileAvatarModal" class="fixed inset-0 bg-gray-900/60 hidden z-50 flex items-center justify-center backdrop-blur-sm" onclick="if(event.target===this) closeProfileAvatarPreview()">
    <div class="bg-white rounded-2xl shadow-2xl p-8 transform scale-95 transition-transform duration-200" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-base font-semibold text-gray-900">头像预览</h3>
            <button onclick="closeProfileAvatarPreview()" class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-times text-lg"></i>
            </button>
        </div>
        <div class="w-48 h-48 rounded-full overflow-hidden flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-600 text-white text-6xl font-semibold shadow-lg" id="profileAvatarBigPreview">
        </div>
    </div>
</div>

<!-- Hidden file input for avatar upload -->
<input type="file" id="avatarInput" accept="image/jpeg,image/png" onchange="handleProfileAvatarUpload(event)" style="display:none;">

<script>
    if (typeof window.initProfilePage === 'function') {
        window.initProfilePage();
    }
</script>
