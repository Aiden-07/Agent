 <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden animate-fade-in">
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <!-- Search (Added for consistency) -->
        <div class="flex gap-4 flex-1 items-center">
            <div class="relative max-w-md w-full">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input id="role-search-input" type="text" placeholder="搜索角色名称、描述..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white shadow-sm">
            </div>
        </div>

        <!-- Action Button -->
        <button onclick="openRoleModal()" class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm flex items-center ml-4">
            <i class="fa-solid fa-plus mr-2"></i>新增角色
        </button>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                    <th class="px-6 py-3 font-medium">角色名称</th>
                    <th class="px-6 py-3 font-medium">描述</th>
                    <th class="px-6 py-3 font-medium">绑定用户数</th>
                    <th class="px-6 py-3 font-medium">权限范围</th>
                    <th class="px-6 py-3 font-medium text-right"></th>
                </tr>
            </thead>
            <tbody id="role-table-body" class="divide-y divide-gray-100 text-sm">
                <!-- Content rendered by JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Role Modal (Add/Edit) -->
<div id="role-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 overflow-hidden animate-fade-in-up">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 id="role-modal-title" class="font-semibold text-gray-800">新增角色</h3>
            <button onclick="closeModal('role-modal')" class="text-gray-400 hover:text-gray-600">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="role-id">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">角色名称</label>
                <input id="role-name" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" placeholder="例如：审核专员">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                <textarea id="role-desc" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" rows="3" placeholder="描述该角色的职责范围"></textarea>
            </div>
        </div>
        <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3">
            <button onclick="closeModal('role-modal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm font-medium transition-colors">取消</button>
            <button onclick="saveRole()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">保存</button>
        </div>
    </div>
</div>

<!-- Permission Modal -->
<div id="permission-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl mx-4 overflow-hidden animate-fade-in-up flex flex-col max-h-[85vh]">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 flex-shrink-0">
            <h3 class="font-semibold text-gray-800">配置权限 - <span id="perm-role-name" class="text-blue-600"></span></h3>
            <button onclick="closeModal('permission-modal')" class="text-gray-400 hover:text-gray-600">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6 bg-gray-50">
            <div id="permission-tree" class="space-y-4">
                <!-- Permission Tree Rendered by JS -->
            </div>
        </div>

        <div class="px-6 py-4 bg-white border-t border-gray-100 flex justify-end gap-3 flex-shrink-0">
            <button onclick="closeModal('permission-modal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm font-medium transition-colors">取消</button>
            <button onclick="savePermissions()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">保存配置</button>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div id="delete-role-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 overflow-hidden animate-fade-in-up">
        <div class="p-6 text-center">
            <div class="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-4 text-xl">
                <i class="fa-solid fa-exclamation-triangle"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">删除角色</h3>
            <p id="delete-role-msg" class="text-sm text-gray-500 mb-6">确认删除该角色？此操作无法撤销。</p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeModal('delete-role-modal')" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm font-medium transition-colors">取消</button>
                <button id="confirm-delete-role-btn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm font-medium transition-colors">确认删除</button>
            </div>
        </div>
    </div>
</div>
