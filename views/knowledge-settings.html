<div class="h-full flex flex-col bg-gray-50">
    <!-- Minimal Nav -->
    <div class="h-12 flex items-center px-6 flex-shrink-0 bg-gray-50">
        <button onclick="window.history.back()" class="text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-2 text-sm font-medium hover:bg-gray-200/50 px-2 py-1 rounded-lg">
            <i class="fa-solid fa-arrow-left"></i>
            <span>返回列表</span>
        </button>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto px-8 pb-8 w-full">
        <div class="max-w-3xl space-y-6">
            
            <!-- Page Title & Actions -->
            <div class="flex justify-between items-end mb-2">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">知识库设置</h1>
                    <div class="flex items-center gap-2 mt-1 text-sm text-gray-500">
                        <span>正在配置:</span>
                        <span id="setting-kb-name-display" class="font-medium text-gray-700 bg-gray-200/50 px-1.5 py-0.5 rounded">加载中...</span>
                    </div>
                </div>
                <button onclick="saveKbSettings()" class="px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 transition-all shadow-sm hover:shadow-md flex items-center gap-2">
                    <i class="fa-solid fa-save"></i> 保存设置
                </button>
            </div>

            <!-- 1. Basic Info -->
            <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-gray-800">基本信息</h3>
                <span class="text-xs text-gray-400">知识库核心属性配置</span>
            </div>
            <div class="p-6 space-y-5">
                <!-- Name and Tags separated into rows -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">知识库名称 <span class="text-red-500">*</span></label>
                    <input type="text" id="kb-setting-name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请输入名称">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">标签</label>
                    <div class="flex flex-wrap gap-2 p-2 border border-gray-300 rounded-lg min-h-[42px]" id="kb-setting-tags">
                        <!-- Tags generated by JS -->
                        <input type="text" class="flex-1 min-w-[60px] outline-none text-sm" placeholder="输入标签按回车..." onkeydown="handleTagInput(event)">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                    <textarea id="kb-setting-desc" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
                </div>
                
                <!-- Custom Fields -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-gray-700">扩展字段</label>
                        <button onclick="openAddFieldModal()" class="text-blue-600 text-sm hover:text-blue-800 font-medium">
                            <i class="fa-solid fa-plus mr-1"></i>新增字段
                        </button>
                    </div>
                    <div class="bg-gray-50 rounded-lg border border-gray-200 overflow-hidden">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-gray-100 text-gray-500 font-medium">
                                <tr>
                                    <th class="px-4 py-2">字段名</th>
                                    <th class="px-4 py-2">类型</th>
                                    <th class="px-4 py-2 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="kb-custom-fields-body" class="divide-y divide-gray-200">
                                <!-- Dynamic Fields -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. Document Fields -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-gray-800">文档字段显示</h3>
                <button onclick="openAddDocFieldModal()" class="text-blue-600 text-sm hover:text-blue-800 font-medium">
                    <i class="fa-solid fa-plus mr-1"></i>新增字段
                </button>
            </div>
            <div class="p-6">
                <div class="bg-gray-50 rounded-lg border border-gray-200 overflow-hidden">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-100 text-gray-500 font-medium">
                            <tr>
                                <th class="px-4 py-2">字段名</th>
                                <th class="px-4 py-2">类型</th>
                                <th class="px-4 py-2 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="kb-doc-fields-body" class="divide-y divide-gray-200">
                            <!-- Dynamic fields -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- 3. Embedding Settings -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-gray-800">Embedding 模型</h3>
                <span class="text-xs text-gray-400">选择用于向量化文档的模型</span>
            </div>
            <div class="p-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">选择模型 <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <select id="kb-setting-parser" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-none bg-white transition-shadow cursor-pointer">
                            <option value="embedding-2">embedding-2</option>
                            <option value="embedding-3">embedding-3</option>
                            <option value="text_embedding">text_embedding</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">选择合适的 Embedding 模型可以提高知识检索的准确性。</p>
                </div>
            </div>
        </section>

        <!-- 4. Retrieval Settings -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-gray-800">检索设置</h3>
                <span class="text-xs text-gray-400">配置知识库的检索策略与参数</span>
            </div>
            <div class="p-6">
                <div id="create-kb-retrieval-config"></div>
            </div>
        </section>

        <!-- 5. Permissions -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-8">
            <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-gray-800">权限设置</h3>
                <button class="text-sm text-blue-600 hover:underline">管理权限组</button>
            </div>
            <div class="p-6">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 text-gray-500 font-medium border-b border-gray-100">
                        <tr>
                            <th class="px-4 py-3">用户/角色</th>
                            <th class="px-4 py-3">类型</th>
                            <th class="px-4 py-3">权限</th>
                            <th class="px-4 py-3 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr>
                            <td class="px-4 py-3 font-medium">管理员组</td>
                            <td class="px-4 py-3"><span class="bg-purple-100 text-purple-600 px-2 py-0.5 rounded text-xs">角色</span></td>
                            <td class="px-4 py-3">完全控制</td>
                            <td class="px-4 py-3 text-right text-gray-400">默认</td>
                        </tr>
                        <tr>
                            <td class="px-4 py-3 font-medium">普通用户</td>
                            <td class="px-4 py-3"><span class="bg-purple-100 text-purple-600 px-2 py-0.5 rounded text-xs">角色</span></td>
                            <td class="px-4 py-3">
                                <select class="border-gray-200 border rounded px-2 py-1 text-xs focus:border-blue-500 outline-none">
                                    <option>仅查看</option>
                                    <option>查看与编辑</option>
                                    <option>禁止访问</option>
                                </select>
                            </td>
                            <td class="px-4 py-3 text-right">
                                <button class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <button class="mt-4 w-full py-2 border border-dashed border-gray-300 rounded-lg text-gray-500 hover:border-blue-500 hover:text-blue-600 transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> 添加授权
                </button>
            </div>
        </section>
    </div> <!-- End of max-w-3xl wrapper -->
    </div>

    <!-- Add Doc Field Modal -->
    <div id="add-doc-field-modal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 animate-fade-in-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-800" id="doc-field-modal-title">新增文档字段</h3>
                <button onclick="closeAddDocFieldModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="space-y-4">
                <input type="hidden" id="doc-field-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">字段名称</label>
                    <input type="text" id="doc-field-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">字段类型</label>
                    <select id="doc-field-type" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="text">文本</option>
                        <option value="textarea">多行文本</option>
                        <option value="number">数字</option>
                        <option value="date">日期</option>
                        <option value="boolean">布尔值</option>
                        <option value="select">下拉列表</option>
                    </select>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeAddDocFieldModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
                <button onclick="confirmSaveDocField()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors">确认</button>
            </div>
        </div>
    </div>

    <!-- Add Field Modal (Custom Fields) -->
    <div id="add-field-modal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 animate-fade-in-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-800">新增扩展字段</h3>
                <button onclick="closeAddFieldModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">字段名称</label>
                    <input type="text" id="new-field-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">字段类型</label>
                    <select id="new-field-type" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="text">文本</option>
                        <option value="textarea">多行文本</option>
                        <option value="number">数字</option>
                        <option value="date">日期</option>
                        <option value="boolean">布尔值</option>
                        <option value="select">下拉列表</option>
                    </select>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeAddFieldModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
                <button onclick="confirmAddField()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors">确认添加</button>
            </div>
        </div>
    </div>
</div>
