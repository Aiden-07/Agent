<div class="space-y-6 h-full flex flex-col">
    <!-- Header with Stats (Removed) -->
    
    <!-- Toolbar -->
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="relative group">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="text" id="agent-search-input" placeholder="搜索智能体名称/ID..." class="pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent w-72 transition-all shadow-sm">
            </div>
            <select id="agent-status-filter" class="px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-600 bg-white shadow-sm cursor-pointer hover:border-gray-300 transition-colors">
                <option value="all">所有状态</option>
                <option value="running">运行中</option>
                <option value="stopped">已停止</option>
            </select>
        </div>
        <button onclick="openModal('create-agent-modal')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-all shadow-md hover:shadow-lg flex items-center gap-2 transform active:scale-95">
            <i class="fa-solid fa-plus"></i>
            新建智能体
        </button>
    </div>

    <!-- Agent List (Scrollable) -->
    <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
        <div class="overflow-x-auto flex-1" id="agent-list-container">
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-50 text-gray-500 font-medium border-b border-gray-100 sticky top-0 z-10">
                    <tr>
                        <th class="px-6 py-4">智能体名称</th>
                        <th class="px-6 py-4">运行状态</th>
                        <th class="px-6 py-4">模型</th>
                        <th class="px-6 py-4">关联知识库</th>
                        <th class="px-6 py-4">创建人</th>
                        <th class="px-6 py-4">创建时间</th>
                        <th class="px-6 py-4">最后更新时间</th>
                        <th class="px-6 py-4 text-right"></th>
                    </tr>
                </thead>
                <tbody id="agent-list-body" class="divide-y divide-gray-100">
                    <!-- Dynamic Content will be injected here via JS -->
                </tbody>
            </table>
            <!-- Infinite Scroll Loader -->
            <div id="agent-list-loader" class="hidden py-4 text-center text-gray-400">
                <i class="fa-solid fa-spinner fa-spin mr-2"></i> 加载更多...
            </div>
            <!-- Empty State -->
            <div id="agent-list-empty" class="hidden flex flex-col items-center justify-center h-96 text-gray-400">
                <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-6 text-3xl shadow-sm">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <h3 class="text-lg font-medium text-gray-900 mb-2">暂无智能体数据</h3>
                <p class="text-sm text-gray-500 mb-8 max-w-sm text-center">您可以创建一个新的智能体来开始使用，或者等待系统加载默认模板。</p>
                <button onclick="openModal('create-agent-modal')" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow-sm transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i>
                    立即创建智能体
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Create Agent Modal -->
<div id="create-agent-modal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg transform scale-95 transition-transform duration-200" id="create-agent-modal-content">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
            <h3 class="text-lg font-semibold text-gray-900">新建智能体</h3>
            <button onclick="closeModal('create-agent-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">智能体名称 <span class="text-red-500">*</span></label>
                <input type="text" id="new-agent-name" class="w-full px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：客服助手 Alpha">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">基础模型</label>
                <select id="new-agent-model" class="w-full px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                    <option value="deepseek-v2">DeepSeek V2</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">功能描述</label>
                <textarea id="new-agent-desc" rows="3" class="w-full px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="简单描述该智能体的用途..."></textarea>
            </div>
        </div>
        <div class="px-6 py-4 bg-gray-50 rounded-b-xl flex justify-end gap-3 border-t border-gray-100">
            <button onclick="closeModal('create-agent-modal')" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
            <button onclick="createNewAgent()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors">确认创建</button>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="delete-confirm-modal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 text-center">
        <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h3 class="text-lg font-semibold text-gray-900 mb-2">确认删除？</h3>
        <p class="text-sm text-gray-500 mb-6">此操作无法撤销，智能体 <span id="delete-agent-name" class="font-bold text-gray-800"></span> 将被永久删除。</p>
        <div class="flex gap-3 justify-center">
            <button onclick="closeModal('delete-confirm-modal')" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors w-24">取消</button>
            <button id="confirm-delete-btn" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg shadow-sm transition-colors w-24">删除</button>
        </div>
    </div>
</div>

<!-- Stop Confirmation Modal -->
<div id="stop-confirm-modal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 mx-4">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex-shrink-0 flex items-center justify-center text-xl">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <div>
                <h3 class="text-lg font-semibold text-gray-900">确认关闭智能体</h3>
                <p class="text-sm text-gray-500">此操作将立即停止智能体服务。</p>
            </div>
        </div>
        
        <div class="bg-yellow-50 border border-yellow-100 rounded-lg p-4 mb-6">
            <p class="text-sm font-medium text-yellow-800 mb-2">关闭智能体将导致以下功能不可用：</p>
            <ul class="text-sm text-yellow-700 space-y-1 list-disc list-inside ml-1">
                <li>所有关联的自动化任务将停止执行</li>
                <li>对外提供的 API 接口将无法访问</li>
                <li>实时监控数据采集将中断</li>
            </ul>
        </div>

        <div class="flex gap-3 justify-end">
            <button onclick="closeModal('stop-confirm-modal')" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
            <button onclick="confirmStopAgent()" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg shadow-sm transition-colors">确认关闭</button>
        </div>
    </div>
</div>

<!-- Permission Config Modal -->
<div id="permission-config-modal" class="fixed inset-0 bg-gray-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
            <h3 class="text-lg font-semibold text-gray-900">权限配置 - <span id="perm-agent-name"></span></h3>
            <button onclick="closeModal('permission-config-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        
        <div class="p-6 overflow-y-auto flex-1 custom-scrollbar">
            <!-- Add User Section (Tabs) -->
            <div class="bg-gray-50 rounded-lg p-1 mb-6 inline-flex">
                <button onclick="switchPermAddMode('single')" id="perm-tab-single" class="px-4 py-2 text-sm font-medium rounded-md transition-all bg-white text-blue-600 shadow-sm">添加用户</button>
                <button onclick="switchPermAddMode('dept')" id="perm-tab-dept" class="px-4 py-2 text-sm font-medium rounded-md transition-all text-gray-500 hover:text-gray-700">按部门添加</button>
            </div>

            <div class="bg-gray-50 rounded-lg p-4 mb-6 border border-gray-100">
                <div id="perm-mode-single" class="flex items-end gap-3">
                    <div class="flex-1 relative">
                        <label class="block text-sm font-medium text-gray-700 mb-1">搜索用户</label>
                        <div class="relative">
                            <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="perm-user-search" placeholder="输入姓名、手机号或邮箱..." class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" oninput="debounceSearchUser(this.value)">
                            <!-- Search Dropdown -->
                            <div id="perm-search-results" class="hidden absolute top-full left-0 right-0 mt-1 bg-white border border-gray-100 rounded-lg shadow-lg z-10 max-h-48 overflow-y-auto">
                                <!-- Results -->
                            </div>
                        </div>
                    </div>
                    <div class="w-40">
                        <label class="block text-sm font-medium text-gray-700 mb-1">权限角色</label>
                        <select id="perm-role-select-single" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="view">可查看</option>
                            <option value="edit">可编辑</option>
                            <option value="manage">可管理</option>
                        </select>
                    </div>
                    <button onclick="addPermission()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm flex-shrink-0">
                        添加
                    </button>
                </div>

                <div id="perm-mode-dept" class="hidden flex items-end gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">选择部门</label>
                        <select id="perm-dept-select" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="">请选择部门...</option>
                            <!-- Departments -->
                        </select>
                    </div>
                    <div class="w-40">
                        <label class="block text-sm font-medium text-gray-700 mb-1">权限角色</label>
                        <select id="perm-role-select-dept" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="view">可查看</option>
                            <option value="edit">可编辑</option>
                            <option value="manage">可管理</option>
                        </select>
                    </div>
                    <button onclick="addDeptPermissions()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm flex-shrink-0">
                        批量添加
                    </button>
                </div>
            </div>

            <!-- Toolbar & List -->
            <div>
                <div class="flex items-center justify-between mb-3">
                    <h4 class="text-sm font-medium text-gray-900">已授权用户 (<span id="perm-total-count">0</span>)</h4>
                    <div class="flex items-center gap-2">
                        <button id="perm-undo-btn" onclick="undoLastAction()" class="hidden text-xs px-2 py-1 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded transition-colors" title="撤销上一步操作">
                            <i class="fa-solid fa-rotate-left mr-1"></i> 撤销
                        </button>
                        <button id="perm-batch-del-btn" onclick="batchRemovePermissions()" class="hidden text-xs px-2 py-1 bg-red-50 hover:bg-red-100 text-red-600 rounded transition-colors">
                            <i class="fa-solid fa-trash mr-1"></i> 批量删除
                        </button>
                    </div>
                </div>
                
                <div class="border border-gray-200 rounded-lg overflow-hidden flex flex-col min-h-[300px]">
                    <div class="overflow-x-auto flex-1">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-gray-50 text-gray-500 font-medium border-b border-gray-200 sticky top-0">
                                <tr>
                                    <th class="px-4 py-3 w-10">
                                        <input type="checkbox" id="perm-check-all" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500" onchange="togglePermCheckAll(this)">
                                    </th>
                                    <th class="px-4 py-3 w-1/3">用户</th>
                                    <th class="px-4 py-3 w-1/4">部门</th>
                                    <th class="px-4 py-3 w-1/4">权限</th>
                                    <th class="px-4 py-3 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="perm-list-body" class="divide-y divide-gray-100">
                                <!-- Dynamic Permission Rows -->
                            </tbody>
                        </table>
                    </div>
                    <div id="perm-empty-state" class="hidden flex flex-col items-center justify-center flex-1 py-10 text-gray-400">
                        <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center mb-2">
                            <i class="fa-solid fa-users-slash"></i>
                        </div>
                        <p>暂无特别授权</p>
                    </div>
                    
                    <!-- Pagination -->
                    <div id="perm-pagination" class="border-t border-gray-200 px-4 py-3 flex items-center justify-between bg-gray-50 hidden">
                        <span class="text-xs text-gray-500">显示 <span id="perm-page-start">1</span> - <span id="perm-page-end">20</span> 共 <span id="perm-page-total">0</span> 条</span>
                        <div class="flex gap-1">
                            <button onclick="changePermPage(-1)" class="p-1 rounded hover:bg-gray-200 text-gray-500 disabled:opacity-50" id="perm-prev-btn">
                                <i class="fa-solid fa-chevron-left"></i>
                            </button>
                            <button onclick="changePermPage(1)" class="p-1 rounded hover:bg-gray-200 text-gray-500 disabled:opacity-50" id="perm-next-btn">
                                <i class="fa-solid fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="px-6 py-4 bg-gray-50 rounded-b-xl flex justify-between items-center border-t border-gray-100 flex-shrink-0">
             <span class="text-xs text-green-600 hidden" id="perm-auto-save-indicator"><i class="fa-solid fa-check mr-1"></i>已实时保存</span>
             <button onclick="closeModal('permission-config-modal')" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors ml-auto">完成</button>
        </div>
    </div>
</div>

<script>
    // Initialize Agent Page Logic immediately when loaded
    if (typeof initAgentPage === 'function') {
        initAgentPage();
    } else {
        // Fallback if utils.js hasn't loaded this function yet (should be loaded in index.html)
        // We will define specific logic here or ensure utils.js is updated.
        // Ideally, we'll put the heavy logic in utils.js or a specific agent.js to keep views clean.
        // For this prototype, I will trigger a custom event or call a global init function.
        document.dispatchEvent(new Event('view-agent-loaded'));
    }
</script>
