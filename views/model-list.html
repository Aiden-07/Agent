<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden animate-fade-in h-full flex flex-col">
    <!-- Header Area with Breadcrumbs -->
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <div class="flex items-center gap-2 text-sm">
            <a href="javascript:void(0)" onclick="switchView('model-config')" class="text-gray-500 hover:text-blue-600 transition-colors">模型服务商</a>
            <i class="fa-solid fa-chevron-right text-gray-400 text-xs"></i>
            <span class="font-semibold text-gray-800" id="current-provider-name">服务商名称</span>
        </div>
        
        <!-- Action Button -->
        <button onclick="openModelModal()" class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm flex items-center">
            <i class="fa-solid fa-plus mr-2"></i>新增模型
        </button>
    </div>

    <!-- Table Container -->
    <div class="flex-1 overflow-y-auto min-h-0 relative">
        <div class="dt-scroll-wrap min-w-0">
        <table id="model-data-table" class="w-full text-left border-collapse">
            <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
                <tr class="text-gray-500 text-xs uppercase tracking-wider">
                    <th class="px-6 py-3 font-medium">模型名称</th>
                    <th class="px-6 py-3 font-medium">模型类型</th>
                    <th class="px-6 py-3 font-medium">模型能力</th>
                    <th class="px-6 py-3 font-medium">启用状态</th>
                    <th class="px-6 py-3 font-medium text-right w-48 dt-th-sticky-end">操作</th>
                </tr>
            </thead>
            <tbody id="model-table-body" class="divide-y divide-gray-100 text-sm bg-white">
                <!-- Rows populated by JS -->
            </tbody>
        </table>
        </div>
        
        <!-- Loading Skeleton -->
        <div id="model-loading" class="absolute inset-0 bg-white flex flex-col hidden">
            <div class="animate-pulse flex-1 p-6 space-y-4">
                <div class="h-10 bg-gray-200 rounded w-full"></div>
                <div class="h-10 bg-gray-200 rounded w-full"></div>
                <div class="h-10 bg-gray-200 rounded w-full"></div>
                <div class="h-10 bg-gray-200 rounded w-full"></div>
                <div class="h-10 bg-gray-200 rounded w-full"></div>
            </div>
        </div>
    </div>
    
    <!-- Pagination -->
    <div class="px-6 py-3 border-t border-gray-100 flex items-center justify-between bg-white">
        <div class="text-sm text-gray-500" id="model-pagination-info">共 0 条数据</div>
        <div class="flex gap-2">
            <button onclick="changeModelPage(-1)" class="px-3 py-1 border border-gray-200 rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" id="model-prev-btn">上一页</button>
            <button onclick="changeModelPage(1)" class="px-3 py-1 border border-gray-200 rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" id="model-next-btn">下一页</button>
        </div>
    </div>
</div>

<!-- Add/Edit Model Modal -->
<div id="model-modal" class="fixed inset-0 bg-gray-900/50 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity" aria-hidden="true">
    <div class="bg-white rounded-xl shadow-xl w-[500px] animate-fade-in-up" id="model-modal-content">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 id="model-modal-title" class="font-semibold text-gray-800 text-lg">新增模型</h3>
            <button onclick="closeModal('model-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
        </div>
        
        <form id="model-form" onsubmit="event.preventDefault(); saveModel();" class="p-6 space-y-5">
            <input type="hidden" id="model-id">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">模型名称 <span class="text-red-500">*</span></label>
                <input id="model-name" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="1-100字符">
                <p id="model-name-error" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">模型类型 <span class="text-red-500">*</span></label>
                <select id="model-type" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all">
                    <option value="LLM">LLM (大语言模型)</option>
                    <option value="Embedding">Embedding (嵌入模型)</option>
                    <option value="embedding">embedding (嵌入模型)</option>
                    <option value="Vision">Vision (视觉模型)</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">模型能力 <span class="text-red-500">*</span></label>
                <div class="flex flex-wrap gap-3">
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="model-capabilities" value="vision" class="rounded text-blue-600 focus:ring-blue-500 h-4 w-4">
                        <span class="ml-2 text-sm text-gray-700">视觉 (vision)</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="model-capabilities" value="web_search" class="rounded text-green-600 focus:ring-green-500 h-4 w-4">
                        <span class="ml-2 text-sm text-gray-700">联网 (web_search)</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="model-capabilities" value="embedding" class="rounded text-orange-600 focus:ring-orange-500 h-4 w-4">
                        <span class="ml-2 text-sm text-gray-700">嵌入 (embedding)</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="model-capabilities" value="reasoning" class="rounded text-purple-600 focus:ring-purple-500 h-4 w-4">
                        <span class="ml-2 text-sm text-gray-700">推理 (reasoning)</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="model-capabilities" value="tools" class="rounded text-gray-600 focus:ring-gray-500 h-4 w-4">
                        <span class="ml-2 text-sm text-gray-700">工具 (tools)</span>
                    </label>
                </div>
                <p id="model-capabilities-error" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>
            
            <!-- Footer -->
            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                <button type="button" onclick="closeModal('model-modal')" class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium transition-colors">取消</button>
                <button type="submit" id="model-submit-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white rounded-lg text-sm font-medium transition-colors flex items-center">
                    <span>确定</span>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Delete Model Confirm Modal -->
<div id="model-delete-modal" class="fixed inset-0 bg-gray-900/50 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity" aria-hidden="true">
    <div class="bg-white rounded-xl shadow-xl w-[400px] animate-fade-in-up" id="model-delete-modal-content">
        <div class="p-6">
            <div class="flex items-center justify-center w-12 h-12 rounded-full bg-red-100 mx-auto mb-4">
                <i class="fa-solid fa-exclamation-triangle text-red-600 text-xl"></i>
            </div>
            <h3 class="text-lg font-medium text-gray-900 text-center mb-2">删除模型</h3>
            <p class="text-sm text-gray-500 text-center" id="model-delete-msg">确定删除模型？</p>
        </div>
        <div class="bg-gray-50 px-6 py-4 flex flex-row-reverse gap-3">
            <button id="model-confirm-delete-btn" class="w-full inline-flex justify-center rounded-lg border border-transparent bg-red-600 px-4 py-2 text-base font-medium text-white shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 sm:w-auto sm:text-sm transition-colors">确定删除</button>
            <button onclick="closeModal('model-delete-modal')" class="w-full inline-flex justify-center rounded-lg border border-gray-300 bg-white px-4 py-2 text-base font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 sm:w-auto sm:text-sm transition-colors">取消</button>
        </div>
    </div>
</div>
