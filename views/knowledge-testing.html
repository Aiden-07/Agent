<div class="h-full flex flex-col bg-gray-50">
    <!-- Minimal Nav -->
    <div class="h-12 flex items-center px-6 flex-shrink-0 bg-gray-50">
        <button onclick="window.history.back()" class="text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-2 text-sm font-medium hover:bg-gray-200/50 px-2 py-1 rounded-lg">
            <i class="fa-solid fa-arrow-left"></i>
            <span>返回列表</span>
        </button>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-hidden px-8 pb-8 w-full flex flex-col">
        
        <!-- Page Title -->
        <div class="flex justify-between items-end mb-6 flex-shrink-0">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">命中测试</h1>
                <div class="flex items-center gap-2 mt-1 text-sm text-gray-500">
                    <span>当前测试知识库:</span>
                    <span id="test-kb-name-display" class="font-medium text-gray-700 bg-gray-200/50 px-1.5 py-0.5 rounded">加载中...</span>
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="flex-1 flex gap-6 overflow-hidden">
            
            <!-- Left Panel: Input & Settings -->
            <div class="w-1/3 max-w-md bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-gray-100 bg-gray-50">
                    <h3 class="font-semibold text-gray-800">测试配置</h3>
                </div>
                <div class="p-6 flex-1 overflow-y-auto space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">测试文本</label>
                        <textarea id="test-query-input" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-sm" style="height: 200px;" placeholder="请输入需要测试匹配的用户问题或文本片段..."></textarea>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-sm font-medium text-gray-700">匹配阈值</label>
                                <span class="text-xs text-gray-500" id="threshold-val">0.7</span>
                            </div>
                            <input type="range" id="test-threshold" min="0" max="1" step="0.05" value="0.7" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="document.getElementById('threshold-val').textContent = this.value">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">返回结果数量 (Top K)</label>
                            <input type="number" id="test-top-k" value="5" min="1" max="20" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                        </div>
                    </div>

                    <div class="pt-4">
                        <button onclick="runHitTest()" class="w-[120px] h-[40px] bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-all shadow-sm hover:shadow-md flex items-center justify-center gap-2">
                            <i class="fa-solid fa-play"></i> 开始测试
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Results -->
            <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <h3 class="font-semibold text-gray-800">命中结果</h3>
                        <span class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full hidden" id="result-count-badge">0 条</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <select id="result-sort" class="text-sm border-gray-200 rounded-lg px-2 py-1 text-gray-600 focus:outline-none focus:ring-1 focus:ring-blue-500" onchange="sortTestResults()">
                            <option value="score">按匹配度排序</option>
                            <option value="time">按更新时间排序</option>
                        </select>
                    </div>
                </div>
                
                <div id="test-results-container" class="flex-1 overflow-y-auto p-6 space-y-4">
                    <!-- Empty State -->
                    <div class="h-full flex flex-col items-center justify-center text-gray-400">
                        <i class="fa-solid fa-magnifying-glass-chart text-4xl mb-4 text-gray-300"></i>
                        <p>输入文本并点击“开始测试”以查看命中结果</p>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="px-6 py-3 border-t border-gray-100 bg-gray-50 flex justify-between items-center hidden" id="test-pagination">
                    <span class="text-xs text-gray-500">显示 1-10 条，共 <span id="total-results">0</span> 条</span>
                    <div class="flex gap-2">
                        <button class="px-2 py-1 text-xs border border-gray-300 rounded bg-white text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled>上一页</button>
                        <button class="px-2 py-1 text-xs border border-gray-300 rounded bg-white text-gray-500 hover:bg-gray-50">下一页</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
