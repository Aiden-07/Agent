<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden animate-fade-in h-full flex flex-col">
    
    <!-- Collapsible Filter Area -->
    <div class="px-6 py-4 border-b border-gray-100 bg-white transition-all duration-300 relative" id="user-filter-area">
        <div class="flex items-start justify-between gap-4">
            <!-- Filters Container -->
            <div class="flex-1 flex flex-col gap-4">
                <!-- Row 1: Always visible -->
                <div class="flex items-center gap-4 flex-wrap">
                    <div class="relative w-72 flex-shrink-0">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input id="user-search-input" type="text" placeholder="搜索姓名、手机号、邮箱..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm bg-white shadow-sm transition-shadow">
                    </div>
                    
                    <div class="flex items-center gap-2.5 flex-shrink-0">
                        <span class="text-sm font-medium text-gray-500 whitespace-nowrap">角色</span>
                        <select id="user-role-filter" class="border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700 bg-white shadow-sm cursor-pointer min-w-[140px]">
                            <option value="所有角色">所有角色</option>
                            <option value="管理员">管理员</option>
                            <option value="开发者">开发者</option>
                            <option value="普通用户">普通用户</option>
                        </select>
                    </div>

                    <!-- Status Filter -->
                    <div class="flex items-center gap-2.5 flex-shrink-0 filter-advanced hidden">
                        <span class="text-sm font-medium text-gray-500 whitespace-nowrap">状态</span>
                        <select id="user-status-filter" class="border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700 bg-white shadow-sm cursor-pointer min-w-[140px]">
                            <option value="所有状态">所有状态</option>
                            <option value="normal">正常</option>
                            <option value="locked">锁定</option>
                            <option value="resigned">离职</option>
                        </select>
                    </div>
                </div>

                <!-- Row 2: Advanced Filters -->
                <div class="flex items-center gap-4 flex-wrap filter-advanced hidden">
                    <div class="flex items-center gap-2.5 flex-shrink-0">
                        <span class="text-sm font-medium text-gray-500 whitespace-nowrap">部门</span>
                        <select id="user-dept-filter" class="border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700 bg-white shadow-sm cursor-pointer min-w-[140px]">
                            <option value="所有部门">所有部门</option>
                            <option value="产品部">产品部</option>
                            <option value="研发部">研发部</option>
                            <option value="运营部">运营部</option>
                            <option value="客服部">客服部</option>
                            <option value="设计部">设计部</option>
                            <option value="测试部">测试部</option>
                            <option value="运维部">运维部</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-2.5 flex-shrink-0">
                        <span class="text-sm font-medium text-gray-500 whitespace-nowrap">加入时间</span>
                        <div class="relative w-64">
                            <i class="fa-regular fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 z-10"></i>
                            <input id="user-date-filter" type="text" placeholder="开始时间 - 结束时间" class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm bg-white shadow-sm cursor-pointer flatpickr-input" readonly="readonly">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-start gap-3 flex-shrink-0">
                <button onclick="executeUserSearch()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
                    查询
                </button>
                <button onclick="resetUserSearch()" class="bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 hover:text-gray-800 px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
                    重置
                </button>
                <button onclick="toggleUserFilters()" id="toggle-filter-btn" class="text-blue-600 hover:text-blue-700 px-2 py-2 text-sm font-medium transition-colors flex items-center bg-transparent border-none outline-none">
                    <span>展开筛选</span><i class="fa-solid fa-chevron-down ml-1 text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Separator / Gutter -->
    <div class="h-4 bg-gray-100 border-b border-gray-200"></div>

    <!-- Top Action Area -->
    <div class="px-6 py-4 border-b border-gray-100 flex justify-end items-center bg-white" style="height: 60px;">
        <div class="flex items-center gap-3">
            <button onclick="openAddUserModal()" class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm flex items-center">
                <i class="fa-solid fa-plus mr-2"></i>新增用户
            </button>
        </div>
    </div>
    
    <!-- Filter/Search Bar Removed -->

    <!-- Table Container (Flex Grow + Scroll) -->
    <div class="flex-1 overflow-y-auto min-h-0">
        <div class="dt-scroll-wrap min-w-0">
        <table id="user-data-table" class="w-full text-left border-collapse">
            <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
                <tr class="text-gray-500 text-xs uppercase tracking-wider">
                    <th class="px-6 py-3 font-medium">姓名</th>
                    <th class="px-6 py-3 font-medium">手机号</th>
                    <th class="px-6 py-3 font-medium">邮箱</th>
                    <th class="px-6 py-3 font-medium">部门</th>
                    <th class="px-6 py-3 font-medium">角色</th>
                    <th class="px-6 py-3 font-medium">状态</th>
                    <th class="px-6 py-3 font-medium text-right dt-th-sticky-end">操作</th>
                </tr>
            </thead>
            <tbody id="user-table-body" class="divide-y divide-gray-100 text-sm bg-white">
                <!-- Rows will be populated by JS -->
            </tbody>
        </table>
        </div>
    </div>
</div>

<!-- User Modal (Add/Edit) -->
<div id="user-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden animate-fade-in-up">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 id="user-modal-title" class="font-semibold text-gray-800 text-lg">新增用户</h3>
            <button onclick="closeModal('user-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
        </div>
        
        <form id="user-form" onsubmit="event.preventDefault(); saveUser();" class="p-6 space-y-5 max-h-[70vh] overflow-y-auto">
            <!-- Name -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-red-500">*</span></label>
                    <input id="user-name" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="请输入真实姓名">
                    <p id="user-name-error" class="text-red-500 text-xs mt-1 hidden error-msg"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">部门 <span class="text-red-500">*</span></label>
                    <input id="user-department" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="例如：研发部">
                    <p id="user-department-error" class="text-red-500 text-xs mt-1 hidden error-msg"></p>
                </div>
            </div>

            <!-- Contact Info Group (ADD MODE: Combined) -->
            <div id="user-contact-add-group" class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                <label class="block text-sm font-medium text-gray-700 mb-1">账号 <span class="text-red-500">*</span></label>
                <input id="user-combined-contact" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white" placeholder="请输入手机号或邮箱">
                <p class="text-xs text-gray-500 mt-1">请输入手机号或邮箱作为登录账号</p>
                <p id="user-combined-contact-error" class="text-red-500 text-xs mt-1 hidden error-msg"></p>
            </div>

            <!-- Contact Info Group (EDIT MODE: Split) -->
            <div id="user-contact-edit-group" class="hidden space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-100">
                 <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                        <input id="user-phone" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white" placeholder="11位手机号">
                        <p id="user-phone-error" class="text-red-500 text-xs mt-1 hidden error-msg"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                        <input id="user-email" type="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white" placeholder="example@company.com">
                        <p id="user-email-error" class="text-red-500 text-xs mt-1 hidden error-msg"></p>
                    </div>
                 </div>
            </div>

            <!-- Role -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">角色 <span class="text-red-500">*</span></label>
                <div class="bg-white border border-gray-300 rounded-lg p-4">
                    <div id="role-checkbox-group" class="grid grid-cols-3 gap-4">
                        <label class="inline-flex items-center cursor-pointer hover:bg-gray-50 rounded p-1 -ml-1 transition-colors">
                            <input type="checkbox" name="user-role" value="普通用户" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <span class="ml-2 text-sm text-gray-700">普通用户</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer hover:bg-gray-50 rounded p-1 -ml-1 transition-colors">
                            <input type="checkbox" name="user-role" value="开发者" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <span class="ml-2 text-sm text-gray-700">开发者</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer hover:bg-gray-50 rounded p-1 -ml-1 transition-colors">
                            <input type="checkbox" name="user-role" value="管理员" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <span class="ml-2 text-sm text-gray-700">管理员</span>
                        </label>
                    </div>
                </div>
                <div class="flex justify-between items-center mt-1">
                    <p id="user-role-error" class="text-red-500 text-xs hidden error-msg"></p>
                    <span id="role-selected-count" class="text-xs text-gray-500 ml-auto">已选: 0</span>
                </div>
            </div>

            <!-- Password (Only for Add) -->
            <div id="user-password-field">
                <label class="block text-sm font-medium text-gray-700 mb-1">初始密码 <span class="text-red-500">*</span></label>
                <input id="user-password" type="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="至少8位，包含字母和数字">
                <p id="user-password-error" class="text-red-500 text-xs mt-1 hidden error-msg"></p>
            </div>
        </form>

        <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3 border-t border-gray-100">
            <button type="button" onclick="closeModal('user-modal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm font-medium transition-colors">取消</button>
            <button type="button" onclick="saveUser()" class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">保存</button>
        </div>
    </div>
</div>
