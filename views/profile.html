<div class="h-full overflow-y-auto">
    <div class="max-w-5xl mx-auto space-y-6">
        <section class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-4 min-w-0">
                    <div id="profile-avatar" class="w-14 h-14 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 flex items-center justify-center text-white text-lg font-bold flex-shrink-0">PM</div>
                    <div class="min-w-0">
                        <h2 id="profile-display-name" class="text-lg font-semibold text-gray-900 truncate">Product Manager</h2>
                        <p id="profile-display-email" class="text-sm text-gray-500 truncate">pm@vagent.ai</p>
                    </div>
                </div>
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-100">
                    <i class="fa-solid fa-circle-check mr-1.5"></i>正常
                </span>
            </div>

            <form id="profile-info-form" class="p-6" onsubmit="event.preventDefault(); saveProfileInfo();">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">姓名</label>
                        <input id="profile-name" type="text" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请输入姓名">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">邮箱</label>
                        <input id="profile-email" type="email" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请输入邮箱">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">手机号</label>
                        <input id="profile-phone" type="tel" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请输入手机号">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">部门</label>
                        <input id="profile-department" type="text" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请输入部门">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">角色</label>
                        <input id="profile-role" type="text" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-500" readonly>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">账号状态</label>
                        <input value="正常" type="text" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-500" readonly>
                    </div>
                </div>

                <div id="profile-info-message" class="hidden mt-4 text-sm"></div>

                <div class="mt-6 flex justify-end">
                    <button type="submit" class="inline-flex items-center px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">
                        <i class="fa-solid fa-floppy-disk mr-2"></i>保存信息
                    </button>
                </div>
            </form>
        </section>

        <section class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100">
                <h3 class="text-base font-semibold text-gray-900">修改密码</h3>
            </div>

            <form id="profile-password-form" class="p-6" onsubmit="event.preventDefault(); changeProfilePassword();">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">当前密码</label>
                        <input id="profile-current-password" type="password" autocomplete="current-password" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请输入当前密码">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">新密码</label>
                        <input id="profile-new-password" type="password" autocomplete="new-password" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="至少8位，包含字母和数字">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">确认新密码</label>
                        <input id="profile-confirm-password" type="password" autocomplete="new-password" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请再次输入新密码">
                    </div>
                </div>

                <div id="profile-password-message" class="hidden mt-4 text-sm"></div>

                <div class="mt-6 flex justify-end">
                    <button type="submit" class="inline-flex items-center px-5 py-2.5 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800 transition-colors shadow-sm">
                        <i class="fa-solid fa-key mr-2"></i>修改密码
                    </button>
                </div>
            </form>
        </section>
    </div>
</div>
