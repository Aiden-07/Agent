<body class="p-8">

    <div id="test-results" class="space-y-2"></div>

    <!-- Scripts to Test -->
    <script src="../js/utils.js"></script>

    <script src="../js/components.js"></script>

    <!-- Test Suite -->
    <script>
        const results = document.getElementById('test-results');

        function assert(condition, message) {
            const div = document.createElement('div');
            if (condition) {
                div.className = 'p-2 bg-green-100 text-green-800 rounded';
                div.innerHTML = `<i class="fa-solid fa-check mr-2"></i> PASS: ${message}`;
            } else {
                div.className = 'p-2 bg-red-100 text-red-800 rounded';
                div.innerHTML = `<i class="fa-solid fa-times mr-2"></i> FAIL: ${message}`;
                console.error('FAIL:', message);
            }
            results.appendChild(div);
        }

        async function runTests() {
            await testRoleMgmtTree();
            await testActionMenu();
            await testMobilePositioning();
            await testParserPage();
            await testComponentsPage();
            await testAgentI18nToggle();
            await testAgentI18nCustomModal();
            await testAgentI18nCustomHeightSync();
            await testAgentI18nCustomFeedbackDisabled();
            await testAddQuestionFocus();
        }

        async function testRoleMgmtTree() {
            console.log('Testing Role Management Tree...');

            // Helper to generate deep nodes
            function generateDeepNodes(depth, currentDepth = 1) {
                if (currentDepth > depth) return [];
                return [{
                    id: `d${currentDepth}_1`,
                    label: `Depth ${currentDepth}`,
                    children: generateDeepNodes(depth, currentDepth + 1)
                }];
            }

            // Mock Container
            const container = document.createElement('div');
            container.id = 'test-tree-container';
            container.style.position = 'absolute';
            container.style.left = '-9999px'; // Off-screen but rendered
            document.body.appendChild(container);

            try {
                // Verify Helper Availability
                assert(window.roleMgmtTestHelpers && window.roleMgmtTestHelpers.createTreeList, 'roleMgmtTestHelpers.createTreeList should be exposed');
                
                if (!window.roleMgmtTestHelpers) return;

                // Prepare Test Data
                const testNodes = [
                    {
                        id: 'root', label: 'Root Node', children: [
                            { id: 'child1', label: 'Child 1', children: [] }, // Leaf
                            {
                                id: 'child2', label: 'Child 2', children: [ // Sub-tree
                                    { id: 'grandchild1', label: 'Grandchild 1' }
                                ]
                            }
                        ]
                    }
                ];

                // 1. Test Rendering & Structure
                const treeUl = window.roleMgmtTestHelpers.createTreeList(testNodes, ['child1']);
                container.appendChild(treeUl);

                const rootItems = treeUl.querySelectorAll(':scope > li');
                assert(rootItems.length === 1, 'Should render 1 root node');
                assert(treeUl.getAttribute('role') === 'tree', 'Root UL should have role="tree"');

                const child2 = treeUl.querySelector('input[value="child2"]').closest('li');
                assert(child2 !== null, 'Child 2 should be rendered');
                
                // 2. Test Expand/Collapse
                // Child 2 has children, so it should have expander and start expanded
                assert(child2.getAttribute('aria-expanded') === 'true', 'Node with children should start expanded');
                
                const expander = child2.querySelector('.tree-expander');
                const wrapper = child2.querySelector('.tree-children-wrapper');
                
                // Click to collapse
                // Note: We need to ensure the click event hits the listener. 
                // The listener is on expander: expander.onclick = ...
                if (expander.querySelector('i')) {
                    expander.click(); 
                    await new Promise(r => setTimeout(r, 350)); // Wait for animation (300ms)
                    
                    assert(child2.getAttribute('aria-expanded') === 'false', 'Should collapse after click');
                    assert(wrapper.style.maxHeight === '0px', 'Wrapper max-height should be 0px after collapse');

                    // Click to expand
                    expander.click();
                    await new Promise(r => setTimeout(r, 350));
                    assert(child2.getAttribute('aria-expanded') === 'true', 'Should expand after second click');
                    assert(wrapper.style.maxHeight !== '0px', 'Wrapper max-height should not be 0px after expand');
                } else {
                    assert(false, 'Expander icon not found');
                }

                // 3. Test Checkbox Toggle & Cascade
                const rootCheckbox = treeUl.querySelector('input[value="root"]');
                const child1Checkbox = treeUl.querySelector('input[value="child1"]');
                const child2Checkbox = treeUl.querySelector('input[value="child2"]');
                const grandchildCheckbox = treeUl.querySelector('input[value="grandchild1"]');

                // Initial state
                assert(child1Checkbox.checked, 'Child 1 should be checked initially');
                assert(!child2Checkbox.checked, 'Child 2 should be unchecked initially');
                
                // Click Row to toggle Child 2
                const child2Row = child2.querySelector('.tree-content');
                child2Row.click(); 
                
                assert(child2Checkbox.checked, 'Clicking row should toggle checkbox');
                assert(grandchildCheckbox.checked, 'Selecting parent should select children (Cascade Down)');
                
                // Check cascade up (Root should now be checked because child1 and child2 are checked)
                // Note: updateAncestors runs recursively.
                assert(rootCheckbox.checked, 'Selecting all children should select parent (Cascade Up)');
                
                // 4. Test Keyboard Navigation
                child2Row.focus();
                
                // Press ArrowLeft to collapse
                const leftEvent = new KeyboardEvent('keydown', { key: 'ArrowLeft', bubbles: true });
                child2Row.dispatchEvent(leftEvent);
                await new Promise(r => setTimeout(r, 350));
                assert(child2.getAttribute('aria-expanded') === 'false', 'ArrowLeft should collapse node');
                
                // Press ArrowRight to expand
                const rightEvent = new KeyboardEvent('keydown', { key: 'ArrowRight', bubbles: true });
                child2Row.dispatchEvent(rightEvent);
                await new Promise(r => setTimeout(r, 350));
                assert(child2.getAttribute('aria-expanded') === 'true', 'ArrowRight should expand node');
                
                // Press Enter to toggle checkbox (Uncheck)
                const enterEvent = new KeyboardEvent('keydown', { key: 'Enter', bubbles: true });
                child2Row.dispatchEvent(enterEvent); 
                assert(!child2Checkbox.checked, 'Enter key should toggle checkbox');

                // 5. Performance Test (Depth 5)
                const deepNodes = generateDeepNodes(5);
                const start = performance.now();
                const deepTree = window.roleMgmtTestHelpers.createTreeList(deepNodes, []);
                container.appendChild(deepTree);
                const end = performance.now();
                
                assert((end - start) <= 1000, `Rendering depth 5 tree should take <= 1s (took ${(end - start).toFixed(2)}ms)`);
                
                const deepNode = deepTree.querySelector('input[value="d5_1"]');
                assert(deepNode !== null, 'Depth 5 node should be rendered');

            } catch (e) {
                assert(false, 'Exception during testRoleMgmtTree: ' + e.message);
                console.error(e);
            } finally {
                container.remove();
            }
        }

        async function testParserPage() {
            console.log('Testing Parser Page...');
            
            // Mock DOM
            const tbody = document.createElement('tbody');
            tbody.id = 'parser-list-body';
            document.body.appendChild(tbody);
            
            try {
                // Ensure data exists
                assert(window.parserData && window.parserData.length > 0, 'Parser data should be initialized');
                
                // Render
                window.renderParserList();
                
                // Check rows
                const rows = tbody.querySelectorAll('tr');
                assert(rows.length === window.parserData.length, `Should render ${window.parserData.length} rows`);
                
                // Check action button
                const btn = rows[0].querySelector('button');
                assert(btn !== null, 'Action button should exist in row');
                assert(btn.onclick !== null, 'Action button should have onclick handler');
                
                // Test Open Action Menu
                const event = { stopPropagation: () => {}, currentTarget: btn, preventDefault: () => {} };
                window.openParserActions(event, window.parserData[0].id);
                
                const menu = window.currentActionMenu;
                assert(menu !== null, 'Parser action menu should open');
                if (menu) {
                     assert(menu.textContent.includes('编辑'), 'Menu should contain "编辑"');
                     assert(menu.textContent.includes('测试'), 'Menu should contain "测试"');
                     window.closeActionMenu();
                }

            } catch (e) {
                assert(false, 'Exception during testParserPage: ' + e.message);
                console.error(e);
            }
            
            tbody.remove();
        }

        async function testActionMenu() {
            console.log('Testing Action Menu...');
            
            // Mock Event
            const btn = document.createElement('button');
            btn.style.position = 'absolute';
            btn.style.top = '100px';
            btn.style.left = '100px';
            btn.textContent = 'Click Me';
            document.body.appendChild(btn);
            
            const event = {
                stopPropagation: () => {},
                currentTarget: btn
            };

            // Test 1: Create Menu
            const actions = [
                { label: 'Test Item 1', icon: 'fa-test', onClick: () => {} },
                { label: 'Test Item 2', icon: 'fa-test-2', className: 'text-red-500', onClick: () => {} }
            ];
            
            try {
                // Ensure no menu exists initially
                if (window.currentActionMenu) window.closeActionMenu();

                window.showActionMenu(event, actions);
                
                // Check if menu exists in DOM
                const menu = document.querySelector('.fixed.z-\\[9999\\]');
                assert(menu !== null, 'Action menu element should be created in DOM');
                assert(window.currentActionMenu === menu, 'window.currentActionMenu should reference the menu');
                
                // Check content
                if (menu) {
                    assert(menu.textContent.includes('Test Item 1'), 'Menu should contain "Test Item 1"');
                    assert(menu.textContent.includes('Test Item 2'), 'Menu should contain "Test Item 2"');
                    
                    const buttons = menu.querySelectorAll('button');
                    assert(buttons.length === 2, 'Menu should have 2 buttons');
                    
                    if (buttons[1]) {
                        assert(buttons[1].className.includes('text-red-500'), 'Second item should have custom class');
                    }

                    // Check positioning (basic check)
                    const rect = menu.getBoundingClientRect();
                    assert(rect.top > 0, 'Menu top should be positive');
                    
                    // Check close
                    window.closeActionMenu();
                    assert(document.querySelector('.fixed.z-\\[9999\\]') === null, 'Menu element should be removed from DOM after close');
                    assert(window.currentActionMenu === null, 'window.currentActionMenu should be null after close');
                }
            } catch (e) {
                assert(false, 'Exception during testActionMenu: ' + e.message);
                console.error(e);
            }
            
            btn.remove();
        }

        async function testMobilePositioning() {
            console.log('Testing Mobile Positioning...');
            
            // Mock Button at bottom-right of viewport to force flip/shift
            const btn = document.createElement('button');
            btn.style.position = 'fixed';
            btn.style.bottom = '10px';
            btn.style.right = '10px';
            btn.style.width = '50px';
            btn.style.height = '50px';
            btn.textContent = 'Edge';
            document.body.appendChild(btn);
            
            const event = {
                stopPropagation: () => {},
                currentTarget: btn
            };

            const actions = [{ label: 'Item', icon: 'fa-test', onClick: () => {} }];
            
            try {
                window.showActionMenu(event, actions);
                const menu = window.currentActionMenu;
                
                if (menu) {
                    const rect = menu.getBoundingClientRect();
                    
                    // Should be flipped to top (since bottom space is small)
                    // The button is at bottom 10px, so top of button is window.innerHeight - 60.
                    // Menu top should be less than button top.
                    assert(rect.top < (window.innerHeight - 60), 'Menu should flip to top when space is limited');
                    
                    // Should be shifted left (since right space is small)
                    // But our logic pins to right edge: left = window.innerWidth - menuWidth - 4
                    const expectedLeft = window.innerWidth - 144 - 4; // 144 is w-36 width
                    // Allow small margin of error for scrollbars etc.
                    assert(Math.abs(parseInt(menu.style.left) - expectedLeft) < 20, 'Menu should adjust horizontally to fit viewport');
                    
                    window.closeActionMenu();
                }
            } catch (e) {
                assert(false, 'Exception during testMobilePositioning: ' + e.message);
                console.error(e);
            }
            
            btn.remove();
        }

        async function testAgentI18nToggle() {
            console.log('Testing Agent I18n Toggle...');

            const container = document.createElement('div');
            container.innerHTML = `
                <div id="advanced-content">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="agent-i18n-toggle" class="sr-only peer">
                    </label>
                </div>
                <div id="agent-i18n-modal" class="hidden">
                    <input id="agent-i18n-search" />
                    <div id="agent-i18n-lang-list"></div>
                </div>
                <div id="agent-i18n-summary" class="hidden">
                    <div id="agent-i18n-summary-list"></div>
                </div>
            `;
            document.body.appendChild(container);

            try {
                const toggle = document.getElementById('agent-i18n-toggle');
                assert(toggle !== null, 'I18n toggle checkbox should exist');

                toggle.checked = true;
                window.toggleAgentI18n(true);

                const modal = document.getElementById('agent-i18n-modal');
                assert(modal && !modal.classList.contains('hidden'), 'I18n modal should open when toggle is turned on');

                const list = document.getElementById('agent-i18n-lang-list');
                assert(list && list.children.length > 0, 'Language list should be populated');

                const firstCheckbox = list.querySelector('input[type="checkbox"]');
                if (firstCheckbox) {
                    firstCheckbox.checked = true;
                }

                window.confirmAgentI18nSelection();
                assert(toggle.checked === true, 'Toggle should remain on after confirming selection');

                const summary = document.getElementById('agent-i18n-summary');
                const summaryList = document.getElementById('agent-i18n-summary-list');
                assert(summary && !summary.classList.contains('hidden'), 'Summary should be visible when i18n is enabled');
                assert(summaryList && summaryList.children.length > 0, 'Summary list should show selected languages');

                toggle.checked = false;
                window.toggleAgentI18n(true);

                assert(summary.classList.contains('hidden'), 'Summary should be hidden when i18n is disabled');
                assert(summaryList.children.length === 0, 'Summary list should be cleared when i18n is disabled');
            } catch (e) {
                assert(false, 'Exception during testAgentI18nToggle: ' + e.message);
                console.error(e);
            }

            container.remove();
        }

        async function testAgentI18nCustomModal() {
            console.log('Testing Agent I18n Custom Modal...');

            const container = document.createElement('div');
            container.innerHTML = `
                <input id="edit-agent-name" value="测试智能体名称来自输入框">
                <textarea id="welcome-msg-input">欢迎语来自textarea</textarea>
                <div id="agent-i18n-custom-modal" class="hidden">
                    <div id="agent-i18n-custom-columns"></div>
                </div>
            `;
            document.body.appendChild(container);

            try {
                window.agentI18nConfig.languages = ['zh-CN', 'ko'];
                window.experienceConfig = {
                    welcomeMsg: '测试智能体欢迎语',
                    welcomeQuestions: { enabled: true, list: [] },
                    responseQuestions: { enabled: false, list: [] },
                    feedback: { enabled: true, mandatory: false, custom: false, options: ['内容不准确', '答非所问', '逻辑混乱'] },
                    translation: { enabled: false, targetLang: 'en' }
                };
                window.openAgentI18nCustomModal();

                const modal = document.getElementById('agent-i18n-custom-modal');
                const columns = document.getElementById('agent-i18n-custom-columns');

                assert(modal && !modal.classList.contains('hidden'), 'Custom modal should be visible after opening');
                assert(columns && columns.children.length === window.agentI18nConfig.languages.length, 'Columns count should match selected languages');

                const firstCol = columns.children[0];
                const header = firstCol.querySelector('div');
                assert(header && header.textContent.includes('简体中文'), 'First column should be Simplified Chinese');

                const nameDisplay = firstCol.querySelector('.min-h-\\[32px\\]');
                const welcomeDisplay = firstCol.querySelector('.min-h-\\[40px\\]');
                assert(nameDisplay && nameDisplay.textContent.includes('测试智能体名称来自输入框'), 'Name display should reflect edit-agent-name value');
                assert(welcomeDisplay && welcomeDisplay.textContent.includes('欢迎语来自textarea'), 'Welcome display should reflect welcome-msg-input value');

                const zhInputs = firstCol.querySelectorAll('[data-lang="zh-CN"]');
                assert(zhInputs.length === 0, 'First column should be read-only for default language');

                const pointFeedbackTitle = firstCol.textContent.includes('点踩反馈');
                assert(pointFeedbackTitle === true, 'Feedback section should be visible when feedback is enabled');

                const koWelcome = columns.querySelector('[data-lang="ko"][data-field="welcomeMsg"]');
                assert(koWelcome !== null, 'Welcome message input for ko should exist');

                const secondCol = columns.children[1];
                const koHeader = secondCol.querySelector('div');
                const translateIcon = koHeader ? koHeader.querySelector('.fa-language') : null;
                assert(translateIcon !== null, 'Non-default language header should show translate icon');

                koWelcome.value = '欢迎语韩文翻译';
                window.confirmAgentI18nCustom();

                window.openAgentI18nCustomModal();

                const koWelcome2 = document.querySelector('[data-lang="ko"][data-field="welcomeMsg"]');
                assert(koWelcome2 && koWelcome2.value === '欢迎语韩文翻译', 'Custom info should persist after reopen');
            } catch (e) {
                assert(false, 'Exception during testAgentI18nCustomModal: ' + e.message);
                console.error(e);
            }

            container.remove();
        }

        async function testAgentI18nCustomHeightSync() {
            console.log('Testing Agent I18n Custom Column Height Sync...');

            const container = document.createElement('div');
            container.innerHTML = `
                <input id="agent-name" value="高度同步测试智能体">
                <div id="agent-i18n-custom-modal" class="hidden">
                    <div id="agent-i18n-custom-columns"></div>
                </div>
            `;
            document.body.appendChild(container);

            try {
                window.agentI18nConfig.languages = ['zh-CN', 'ko'];
                window.experienceConfig = {
                    welcomeMsg: '高度同步测试智能体欢迎语',
                    welcomeQuestions: { enabled: true, list: ['Q1'] },
                    responseQuestions: { enabled: false, list: [] },
                    feedback: { enabled: false, mandatory: false, custom: false, options: ['内容不准确', '答非所问', '逻辑混乱'] },
                    translation: { enabled: false, targetLang: 'en' }
                };
                window.openAgentI18nCustomModal();

                await new Promise(resolve => setTimeout(resolve, 0));

                const modal = document.getElementById('agent-i18n-custom-modal');
                const columns = document.getElementById('agent-i18n-custom-columns');

                assert(modal && !modal.classList.contains('hidden'), 'Custom modal should be visible for height sync test');
                assert(columns && columns.children.length === window.agentI18nConfig.languages.length, 'Columns count should match selected languages for height sync');

                const firstCol = columns.children[0];
                const secondCol = columns.children[1];

                const h1 = firstCol.offsetHeight;
                const h2 = secondCol.offsetHeight;

                assert(Math.abs(h1 - h2) < 2, 'Custom columns heights should be synchronized after open');
                assert(columns.className.includes('ring-1'), 'Height sync should add visual feedback class to columns container');

                const welcomeDisplay = firstCol.querySelector('.min-h-\\[40px\\]');
                const welcomeArea = secondCol.querySelector('textarea[data-field="welcomeMsg"]');
                if (welcomeDisplay && welcomeArea) {
                    const hd = welcomeDisplay.offsetHeight;
                    const ha = welcomeArea.offsetHeight;
                    assert(Math.abs(hd - ha) < 2, 'Welcome textarea height should match welcome display div height');
                }

                const koWelcome = secondCol.querySelector('[data-lang="ko"][data-field="welcomeMsg"]');
                if (koWelcome) {
                    koWelcome.style.height = '160px';
                }

                window.dispatchEvent(new Event('resize'));
                await new Promise(resolve => setTimeout(resolve, 0));

                const h1b = firstCol.offsetHeight;
                const h2b = secondCol.offsetHeight;

                assert(Math.abs(h1b - h2b) < 2, 'Custom columns heights should remain synchronized after resize');
            } catch (e) {
                assert(false, 'Exception during testAgentI18nCustomHeightSync: ' + e.message);
                console.error(e);
            }

            container.remove();
        }

            console.log('Testing Add Question Focus...');

            const container = document.createElement('div');
            container.innerHTML = `
