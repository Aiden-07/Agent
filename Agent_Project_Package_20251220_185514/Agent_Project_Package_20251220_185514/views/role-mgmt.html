 <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden animate-fade-in">
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <!-- Search (Added for consistency) -->
        <div class="flex gap-4 flex-1 items-center">
            <div class="relative max-w-md w-full">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input id="role-search-input" type="text" placeholder="搜索角色名称、描述..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white shadow-sm">
            </div>
        </div>

        <!-- Action Button -->
        <button onclick="openModal('role-modal')" class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm flex items-center ml-4">
            <i class="fa-solid fa-shield-alt mr-2"></i>新增角色
        </button>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                    <th class="px-6 py-3 font-medium">角色名称</th>
                    <th class="px-6 py-3 font-medium">描述</th>
                    <th class="px-6 py-3 font-medium">绑定用户数</th>
                    <th class="px-6 py-3 font-medium">权限范围</th>
                    <th class="px-6 py-3 font-medium text-right"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 text-sm">
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium text-gray-800">超级管理员</td>
                    <td class="px-6 py-4 text-gray-500">拥有系统所有权限</td>
                    <td class="px-6 py-4">1</td>
                    <td class="px-6 py-4"><span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs">ALL ACCESS</span></td>
                    <td class="px-6 py-4 text-right">
                        <span class="text-gray-400 text-xs bg-gray-100 px-2 py-1 rounded">系统默认</span>
                    </td>
                </tr>
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium text-gray-800">开发者</td>
                    <td class="px-6 py-4 text-gray-500">负责智能体构建与调试</td>
                    <td class="px-6 py-4">5</td>
                    <td class="px-6 py-4">
                        <div class="flex gap-1 flex-wrap">
                            <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs">构建.*</span>
                            <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs">运营.*</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="window.openRoleActions(event, '开发者')" class="p-2 text-gray-400 hover:text-gray-600 rounded-full hover:bg-gray-100 transition-colors">
                            <i class="fa-solid fa-ellipsis"></i>
                        </button>
                    </td>
                </tr>
                    <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium text-gray-800">只读访客</td>
                    <td class="px-6 py-4 text-gray-500">仅可查看数据报表</td>
                    <td class="px-6 py-4">0</td>
                    <td class="px-6 py-4">
                        <div class="flex gap-1 flex-wrap">
                            <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs">Dashboard.read</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="window.openRoleActions(event, '只读访客')" class="p-2 text-gray-400 hover:text-gray-600 rounded-full hover:bg-gray-100 transition-colors">
                            <i class="fa-solid fa-ellipsis"></i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Role Modal -->
<div id="role-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 overflow-hidden animate-fade-in-up">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 class="font-semibold text-gray-800">新增角色</h3>
            <button onclick="closeModal('role-modal')" class="text-gray-400 hover:text-gray-600">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
            <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">角色名称</label>
                <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：审核专员">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" rows="3" placeholder="描述该角色的职责范围"></textarea>
            </div>
        </div>
            <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3">
            <button onclick="closeModal('role-modal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm font-medium transition-colors">取消</button>
            <button onclick="closeModal('role-modal')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">保存</button>
        </div>
    </div>
</div>
