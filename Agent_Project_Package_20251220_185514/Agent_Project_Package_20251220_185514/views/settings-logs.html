<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden animate-fade-in h-full flex flex-col">
    <!-- Header removed -->

    <!-- Filter/Search Bar -->
    <div class="p-4 border-b border-gray-100 flex gap-4 flex-wrap bg-white">
        <div class="relative flex-1 max-w-md min-w-[200px] group">
            <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="logs-search-input" placeholder="搜索日志内容、操作人、类型、IP..." 
                class="w-full pl-10 pr-10 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400">
            <button id="logs-search-clear" class="hidden absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-300 hover:text-gray-500 transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <!-- Table Container -->
    <div class="flex-1 overflow-auto">
        <table class="w-full text-left border-collapse sticky top-0">
            <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
                <tr class="text-gray-500 text-xs uppercase tracking-wider">
                    <th class="px-6 py-3 font-medium whitespace-nowrap w-48">时间</th>
                    <th class="px-6 py-3 font-medium whitespace-nowrap w-32">操作人</th>
                    <th class="px-6 py-3 font-medium whitespace-nowrap w-48">事件类型</th>
                    <th class="px-6 py-3 font-medium">详情</th>
                    <th class="px-6 py-3 font-medium whitespace-nowrap w-40">IP 地址</th>
                </tr>
            </thead>
            <tbody id="logs-table-body" class="divide-y divide-gray-100 text-sm bg-white">
                <!-- Logs will be populated by js/settings-logs.js -->
            </tbody>
        </table>
    </div>
</div>
